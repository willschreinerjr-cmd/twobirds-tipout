<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#1f9d55" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TwoBirds Tipout" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="AppFront.png" />
  <link rel="apple-touch-icon" href="AppFront.png" />
  <title>TwoBirds Tipout</title>

  <style>
    :root{
      --bg:#f6f7f9; --card:#fff; --border:#e5e7eb; --text:#111827; --muted:#6b7280;
      --green:#1f9d55; --green-dark:#178a48;
      --motion-fast:180ms;
      --motion-panel:320ms;
      --motion-scene:780ms;
      --motion-slow:1000ms;
      --motion-venue-switch:1000ms;
      --motion-ease:cubic-bezier(.22,.61,.36,1);
      --motion-soft:cubic-bezier(.2,.7,.2,1);
    }
    *{ box-sizing:border-box; }
    *{ -webkit-tap-highlight-color:transparent; }
    body{ margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      opacity:0;
      transition:opacity var(--motion-venue-switch) var(--motion-soft);
      pointer-events:none;
      z-index:0;
    }
    body::before{ background-image:var(--venue-bg-image-a, none); }
    body::after{ background-image:var(--venue-bg-image-b, none); }
    body.has-venue-bg.bg-layer-a-active::before{ opacity:0.25; }
    body.has-venue-bg.bg-layer-a-active::after{ opacity:0; }
    body.has-venue-bg.bg-layer-b-active::before{ opacity:0; }
    body.has-venue-bg.bg-layer-b-active::after{ opacity:0.25; }
    .app{ max-width:1200px; margin:0 auto; padding:24px 20px; position:relative; z-index:1; opacity:1; transform:translateY(0); transition:opacity var(--motion-scene) var(--motion-soft), transform var(--motion-scene) var(--motion-soft); -webkit-backface-visibility:hidden; backface-visibility:hidden; }
    body.pin-gate-active .app{ opacity:0; transform:translateY(12px); }

    header{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:20px; }
    .brand{ display:flex; align-items:center; gap:14px; }
    .logo-wrap{
      background:#fff; border:1px solid var(--border); border-radius:16px; padding:10px 12px;
      box-shadow:0 6px 18px rgba(0,0,0,0.04); display:flex; align-items:center;
    }
    .logo{ height:42px; width:auto; display:block; object-fit:contain; }
    h1{ margin:0; font-size:28px; font-weight:900; letter-spacing:-0.5px; }
    .subtitle{ color:#4b5563; font-size:14px; font-weight:700; margin-top:4px; }
    .manager-welcome{
      background:#fff;
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 14px;
      font-size:14px;
      font-weight:700;
      color:#065f46;
      box-shadow:0 6px 18px rgba(0,0,0,0.04);
      white-space:nowrap;
      display:none;
    }
    .header-meta{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .venue-select-wrap{
      position:relative;
      display:none;
      align-items:center;
      background:#fff;
      border:1px solid var(--border);
      border-radius:999px;
      box-shadow:0 6px 18px rgba(0,0,0,0.04);
      padding-left:58px;
      min-width:210px;
    }
    .venue-select-wrap.ui-fade{ transition:opacity var(--motion-venue-switch) var(--motion-soft), transform var(--motion-venue-switch) var(--motion-soft); }
    .venue-prefix{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      font-size:14px;
      font-weight:700;
      color:#1f2937;
      pointer-events:none;
      white-space:nowrap;
    }
    .venue-select{
      background:transparent;
      border:0;
      border-radius:999px;
      padding:10px 14px 10px 0;
      min-width:150px;
      font-size:14px;
      font-weight:700;
      color:#1f2937;
      white-space:nowrap;
      display:inline-flex;
      outline:none;
      cursor:pointer;
      appearance:auto;
    }
    .venue-photo-card{
      display:none;
      padding:12px;
    }
    .venue-photo-wrap{
      width:100%;
      border-radius:14px;
      overflow:hidden;
      border:1px solid var(--border);
      background:#f3f4f6;
    }
    .venue-photo{
      width:100%;
      height:220px;
      object-fit:cover;
      display:block;
    }
    .venue-photo-label{
      margin:10px 2px 2px;
      font-size:14px;
      font-weight:700;
      color:#1f2937;
    }

    .pin-gate{
      position:fixed;
      inset:0;
      z-index:10000;
      background:#f6f7f9;
      display:grid;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      opacity:1;
      transition:opacity var(--motion-scene) var(--motion-soft);
      -webkit-backface-visibility:hidden;
      backface-visibility:hidden;
    }
    .pin-gate.is-leaving{ opacity:0; pointer-events:none; }
    .pin-gate-card{
      grid-area:1 / 1;
      width:100%;
      max-width:660px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:24px;
      padding:34px;
      box-shadow:0 16px 40px rgba(0,0,0,0.08);
      text-align:center;
      max-height:calc(100vh - 40px);
      max-height:calc(100dvh - 40px);
      position:relative;
      opacity:1;
      transform:translateY(0);
      transition:opacity var(--motion-panel) var(--motion-ease), transform var(--motion-panel) var(--motion-ease);
      will-change:opacity, transform;
      -webkit-backface-visibility:hidden;
      backface-visibility:hidden;
    }
    .pin-gate-card.is-hidden{
      opacity:0;
      transform:translateY(10px);
      pointer-events:none;
      visibility:hidden;
    }
    .pin-gate-logo-row{
      display:flex;
      justify-content:center;
      margin-bottom:12px;
      transition:opacity var(--motion-panel) var(--motion-ease), transform var(--motion-panel) var(--motion-ease);
    }
    .pin-gate-logo{
      height:52px;
      width:auto;
      display:block;
      object-fit:contain;
    }
    .pin-gate-title{
      margin:0;
      font-size:34px;
      font-weight:900;
      letter-spacing:-0.6px;
      transition:opacity var(--motion-panel) var(--motion-ease), transform var(--motion-panel) var(--motion-ease);
      transition-delay:40ms;
    }
    .pin-gate-subtitle{
      margin:10px 0 18px;
      color:var(--muted);
      font-size:16px;
      font-weight:600;
      transition:opacity var(--motion-panel) var(--motion-ease), transform var(--motion-panel) var(--motion-ease);
      transition-delay:80ms;
    }
    .pin-gate-greeting{
      margin:8px 0 4px;
      color:#1f2937;
      font-size:17px;
      font-weight:700;
      transition:opacity var(--motion-panel) var(--motion-ease), transform var(--motion-panel) var(--motion-ease);
      transition-delay:120ms;
    }
    .pin-display{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:2px 0 16px;
      transition:opacity var(--motion-panel) var(--motion-ease), transform var(--motion-panel) var(--motion-ease);
      transition-delay:120ms;
    }
    .pin-dot{
      width:16px;
      height:16px;
      border-radius:50%;
      border:2px solid #9ca3af;
      background:transparent;
      transition:border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }
    .pin-dot.filled{
      border-color:var(--green);
      background:var(--green);
      transform:scale(1.15);
    }
    .pin-keypad{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:10px;
      max-width:300px;
      margin:0 auto;
      position:relative;
      transition:opacity var(--motion-panel) var(--motion-ease), transform var(--motion-panel) var(--motion-ease);
      transition-delay:140ms;
    }
    .pin-key{
      min-height:52px;
      font-size:22px;
      font-weight:800;
      padding:0;
    }
    .pin-key.action{
      font-size:14px;
      font-weight:700;
      padding:12px 8px;
    }
    #managerPinDelete{
      background:#fef2f2;
      border-color:#fecaca;
      color:#b91c1c;
    }
    #managerPinDelete:hover{
      background:#fee2e2;
    }
    .pin-gate-error{
      min-height:22px;
      margin-top:14px;
      color:#b91c1c;
      font-weight:700;
      font-size:14px;
      opacity:0;
      transition:opacity 0.3s ease;
    }
    .pin-gate-error.visible{ opacity:1; }
    .pin-gate-error.fade-out{ opacity:0; }

    @keyframes pinShake{
      0%, 100%{ transform:translateX(0); }
      15%{ transform:translateX(-6px); }
      30%{ transform:translateX(5px); }
      45%{ transform:translateX(-4px); }
      60%{ transform:translateX(3px); }
      75%{ transform:translateX(-2px); }
    }
    .pin-display.shake{
      animation:pinShake 0.45s ease;
    }
    .pin-gate-card.entering .pin-gate-logo-row,
    .pin-gate-card.entering .pin-gate-title,
    .pin-gate-card.entering .pin-gate-subtitle,
    .pin-gate-card.entering .pin-gate-greeting,
    .pin-gate-card.entering .pin-display,
    .pin-gate-card.entering .pin-keypad{
      opacity:0;
      transform:translateY(10px);
    }
    .pin-gate-error.fade-out{ opacity:0; }
    .pin-venue-buttons{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }
    .venue-gate-loading{
      display:none;
      width:100%;
      height:10px;
      border-radius:999px;
      background:#e5e7eb;
      overflow:hidden;
      margin:6px 0 4px;
    }
    .venue-gate-loading-bar{
      width:40%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#1f9d55,#34d399);
      animation:venueLoad 1s ease-in-out infinite;
      transform:translateX(-100%);
    }
    @keyframes venueLoad{
      0%{ transform:translateX(-100%); }
      100%{ transform:translateX(250%); }
    }
    .pin-venue-option{
      position:relative;
      overflow:hidden;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      min-height:0;
      padding:0;
      cursor:pointer;
      display:flex;
      align-items:stretch;
      transition:transform var(--motion-fast) var(--motion-ease), box-shadow var(--motion-fast) var(--motion-ease), opacity var(--motion-fast) var(--motion-ease);
      box-shadow:0 4px 14px rgba(0,0,0,0.07);
    }
    .pin-venue-option:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 24px rgba(0,0,0,0.16);
    }
    .pin-venue-option:active{
      transform:translateY(0);
    }
    .pin-venue-option:disabled{
      cursor:default;
      pointer-events:none;
      opacity:0.9;
    }
    .pin-venue-option::after{
      display:none;
    }
    .pin-venue-photo{
      width:100px;
      min-height:72px;
      object-fit:cover;
      display:block;
      background:#eef0f3;
      flex-shrink:0;
    }
    .pin-venue-name{
      position:static;
      display:flex;
      align-items:center;
      flex:1;
      padding:14px 18px;
      text-align:left;
      font-size:20px;
      font-weight:800;
      color:#1f2937;
      text-shadow:none;
      letter-spacing:0.1px;
    }

    @media (max-width: 720px){
      .pin-gate{
        align-items:center;
        padding:12px;
      }
      .pin-gate-card{
        padding:22px;
        border-radius:18px;
        border:1px solid var(--border);
        box-shadow:0 12px 32px rgba(0,0,0,0.08);
        max-width:100%;
        min-height:0;
        max-height:calc(100vh - 24px);
        max-height:calc(100dvh - 24px);
      }
      .pin-venue-buttons{
        gap:8px;
      }
      .pin-key[data-digit]{
        background:#eaf3ff;
        border-color:#bfdbfe;
        color:#1e3a8a;
      }
      .pin-key[data-digit]:hover{
        background:#dbeafe;
      }
      .pin-key.action{
        background:#f4f5f7;
        border-color:var(--border);
        color:#1f2937;
      }
      .pin-venue-option{ min-height:0; }
      .pin-venue-photo{ width:80px; min-height:60px; }
      .pin-venue-name{ font-size:17px; padding:12px 14px; }
      button:hover,
      .pin-venue-option:hover,
      .name-suggestion-item:hover{
        transform:none;
        box-shadow:none;
      }
    }

    .card{
      background:var(--card); border:1px solid var(--border); border-radius:18px; padding:22px; margin-bottom:18px;
      box-shadow:0 8px 22px rgba(0,0,0,0.04);
    }
    .app > .card:first-of-type{
      box-shadow:0 10px 26px rgba(0,0,0,0.06);
      border-color:#dfe3e8;
    }
    label{ display:block; font-weight:700; margin-bottom:6px; font-size:14px; }
    input{ width:100%; padding:14px 16px; font-size:18px; border-radius:14px; border:1px solid var(--border); outline:none; transition:border-color var(--motion-fast) var(--motion-ease), box-shadow var(--motion-fast) var(--motion-ease), background-color var(--motion-fast) var(--motion-ease); }
    input:focus{ border-color:var(--green); }
    .staff-role{
      width:100%;
      padding:10px 12px;
      font-size:14px;
      font-weight:700;
      border-radius:12px;
      border:1px solid var(--border);
      background:#fff;
      color:#1f2937;
      outline:none;
      transition:border-color var(--motion-fast) var(--motion-ease), box-shadow var(--motion-fast) var(--motion-ease), background-color var(--motion-fast) var(--motion-ease), color var(--motion-fast) var(--motion-ease);
    }
    .staff-role:focus{ border-color:var(--green); }
    .staff-row[data-role="Event Staff"] .staff-role{
      background:#fafafa;
      border-color:#9ca3af;
      color:#4b5563;
    }
    .staff-row[data-role="Shift Manager"] .staff-role{
      background:#f3f4f6;
      border-color:var(--green);
      color:#065f46;
    }
    .staff-row[data-role="Bartender"] .staff-role{
      background:#fff;
      border-color:#111827;
      color:#111827;
    }
    .staff-row[data-role="Event Staff"] td:first-child{ box-shadow:inset 3px 0 0 #9ca3af; }
    .staff-row[data-role="Shift Manager"] td:first-child{ box-shadow:inset 3px 0 0 var(--green-dark); }
    .staff-row[data-role="Bartender"] td:first-child{ box-shadow:inset 3px 0 0 #111827; }
    .hours-input:disabled{
      background:#f3f4f6;
      color:#9ca3af;
      cursor:not-allowed;
    }
    textarea{ width:100%; padding:12px 14px; font-size:15px; border-radius:14px; border:1px solid var(--border); outline:none; resize:vertical; min-height:84px; font-family:inherit; transition:border-color var(--motion-fast) var(--motion-ease), box-shadow var(--motion-fast) var(--motion-ease), background-color var(--motion-fast) var(--motion-ease); }
    textarea:focus{ border-color:var(--green); }

    .row{ display:flex; gap:14px; flex-wrap:wrap; align-items:end; }
    .row > *{ flex:1; min-width:220px; }
    .actions{ gap:12px; }
    .actions button{ min-height:48px; }

    .status{ font-size:13px; color:var(--muted); margin-top:10px; min-height:18px; opacity:1; transition:opacity var(--motion-panel) var(--motion-ease); }
    .status.success{ color:var(--green-dark); }
    .status.error{ color:#b91c1c; }
    .status.fade-out{ opacity:0; }
    .send-loading{
      display:none;
      width:100%;
      height:10px;
      border-radius:999px;
      background:#e5e7eb;
      overflow:hidden;
      margin-top:10px;
    }
    .send-loading-bar{
      width:40%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#1f9d55,#34d399);
      animation:sendLoad 1s ease-in-out infinite;
      transform:translateX(-100%);
    }
    .ui-fade{
      opacity:1;
      transform:translateY(0);
      transition:opacity var(--motion-panel) var(--motion-ease), transform var(--motion-panel) var(--motion-ease);
      will-change:opacity, transform;
      -webkit-backface-visibility:hidden;
      backface-visibility:hidden;
    }
    .ui-fade.is-hidden{
      opacity:0;
      transform:translateY(8px);
      pointer-events:none;
    }
    @keyframes sendLoad{
      0%{ transform:translateX(-100%); }
      100%{ transform:translateX(250%); }
    }

    button{
      padding:14px 18px; font-size:16px; border-radius:14px; border:1px solid var(--border);
      background:#f4f5f7; color:#1f2937; cursor:pointer; font-weight:700;
      transition:background-color var(--motion-fast) var(--motion-ease), border-color var(--motion-fast) var(--motion-ease), box-shadow var(--motion-fast) var(--motion-ease), transform var(--motion-fast) var(--motion-ease);
      touch-action:manipulation;
    }
    button:hover{ background:#eef0f3; }
    button:active{ transform:translateY(1px) scale(0.995); }
    button:focus-visible{
      outline:none;
      box-shadow:0 0 0 3px rgba(31,157,85,0.22);
      border-color:var(--green);
    }
    button.primary{ background:var(--green); color:#fff; border-color:var(--green); }
    button.primary:hover{ background:var(--green-dark); }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    button.primary:disabled{ background:#9ca3af; border-color:#9ca3af; }
    button.reset{ background:#eef0f3; }
    .venue-picker{ margin-top:12px; padding:12px; border:1px solid var(--border); border-radius:14px; background:#fafafa; }
    .venue-picker.ui-fade{ transition:opacity var(--motion-venue-switch) var(--motion-soft), transform var(--motion-venue-switch) var(--motion-soft); }
    .venue-actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
    .venue-actions button{ padding:10px 14px; font-size:14px; }
    .venue-actions .cancel{ background:#eef0f3; }

    table{ width:100%; border-collapse:collapse; margin-top:6px; }
    th{ text-align:left; font-size:13px; color:#374151; font-weight:800; padding-bottom:8px; }
    td{ padding:11px 0; border-bottom:1px solid var(--border); }
    th.right, td.right{ text-align:right; }

    .remove{
      background:none; border:none; font-size:18px; cursor:pointer; color:#9ca3af;
      padding:8px 10px; border-radius:12px;
    }
    .remove:hover{ color:#ef4444; background:#fff5f5; }

    .results-card{ background:linear-gradient(180deg,#ffffff,#f9fafb); }
    .results-empty{ color:var(--muted); font-size:14px; padding:12px 2px; }
    .results-card thead th:nth-child(2),
    .results-card tbody td:nth-child(2){ text-align:center; }

    .name-suggestion-menu{
      position:absolute;
      z-index:9999;
      display:none;
      max-height:240px;
      overflow:auto;
      background:#fff;
      border:1px solid var(--border);
      border-radius:12px;
      box-shadow:0 8px 24px rgba(0,0,0,0.08);
    }
    .name-suggestion-item{
      width:100%;
      text-align:left;
      border:0;
      border-bottom:1px solid #f3f4f6;
      background:#fff;
      padding:10px 12px;
      font-size:14px;
      font-weight:600;
      color:#111827;
      cursor:pointer;
    }
    .name-suggestion-item:last-child{ border-bottom:0; }
    .name-suggestion-item.active,
    .name-suggestion-item:hover{
      background:#eef6ff;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translate(-50%, 12px);
      background:#111827;
      color:#fff;
      font-size:13px;
      font-weight:700;
      padding:10px 14px;
      border-radius:999px;
      box-shadow:0 10px 24px rgba(0,0,0,0.25);
      opacity:0;
      pointer-events:none;
      transition:opacity var(--motion-fast) var(--motion-ease), transform var(--motion-fast) var(--motion-ease);
      z-index:20000;
      white-space:nowrap;
    }
    .toast.show{
      opacity:1;
      transform:translate(-50%, 0);
    }

    @media (max-width: 720px){
      :root{
        --motion-fast:220ms;
        --motion-panel:380ms;
        --motion-scene:920ms;
      }
      .app{ padding:12px; }
      header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
      }
      .brand{
        width:100%;
        gap:10px;
      }
      .logo-wrap{
        padding:8px 10px;
        border-radius:12px;
      }
      .logo{ height:34px; }
      h1{ font-size:24px; }
      .subtitle{ font-size:13px; }
      .header-meta{
        width:100%;
        justify-content:flex-start;
      }
      .manager-welcome{
        width:100%;
        border-radius:14px;
        white-space:normal;
      }
      .venue-select-wrap{
        width:100%;
        min-width:0;
        padding-left:64px;
      }
      .venue-prefix{
        left:12px;
        font-size:12px;
      }
      .venue-select{
        width:100%;
        min-width:0;
        padding:10px 10px 10px 0;
        font-size:13px;
      }
      .card{
        padding:14px;
        border-radius:14px;
      }
      .row{
        flex-direction:column;
        align-items:stretch;
        gap:10px;
      }
      .row > *{
        min-width:0;
        width:100%;
      }
      input{
        font-size:16px;
        padding:12px 14px;
      }
      textarea{
        font-size:14px;
        padding:10px 12px;
      }
      .actions{ gap:8px; }

function setElementVisible(el, visible, displayValue = "block", durationMs = VISIBILITY_TRANSITION_MS){
  if (!el) return;

  const existingTimer = visibilityTimers.get(el);
  if (existingTimer) {
    clearTimeout(existingTimer);
    visibilityTimers.delete(el);
  }

  if (visible) {
    if (el.style.display === "none") {
      el.style.display = displayValue;
    } else if (!el.style.display) {
      el.style.display = displayValue;
    }
    requestAnimationFrame(() => {
      el.classList.remove("is-hidden");
    });
    return;
  }

  el.classList.add("is-hidden");
  const timer = setTimeout(() => {
    if (el.classList.contains("is-hidden")) {
      el.style.display = "none";
    }
    visibilityTimers.delete(el);
  }, durationMs);
  visibilityTimers.set(el, timer);
}

function setLoadingVisibleWithMinimum(el, isLoading, displayValue = "block"){
  if (!el) return;

  let state = loadingStateMap.get(el);
  if (!state) {
    state = { shownAt: 0, hideTimer: null };
    loadingStateMap.set(el, state);
  }

  if (state.hideTimer) {
    clearTimeout(state.hideTimer);
    state.hideTimer = null;
  }

  if (isLoading) {
    state.shownAt = Date.now();
    setElementVisible(el, true, displayValue);
    return;
  }

  const elapsed = Date.now() - state.shownAt;
  const waitMs = Math.max(0, MIN_LOADING_VISIBLE_MS - elapsed);
  if (waitMs <= 0) {
    setElementVisible(el, false, displayValue);
    return;
  }

  state.hideTimer = setTimeout(() => {
    setElementVisible(el, false, displayValue);
    state.hideTimer = null;
  }, waitMs);
}

function setVenueBadge(text){

    return;

  setElementVisible(wrap, true, "inline-flex", VENUE_SELECT_TRANSITION_MS);

  if (value === "Venue: Detecting..." || value === "Venue: Not selected" || value === "Venue: Not detected") {
    select.value = "";
    return;
  }

  const venueText = value.startsWith("Venue:") ? value.slice(6).trim() : value;
  const venueName = venueText.replace(/\s*\(Estimated\)\s*$/i, "").trim();
  const hasVenue = [...select.options].some(opt => opt.value === venueName);
  if (hasVenue) select.value = venueName;
}

function getSelectedVenueValue(){
  const select = $("venueSelect");
  const selected = String(select?.value || "").trim();
  return VENUES.includes(selected) ? selected : "";
}

function initVenueSelect(){
  const select = $("venueSelect");
  if (!select) return;

  select.innerHTML = "";

  const placeholder = document.createElement("option");
  placeholder.value = "";
  placeholder.textContent = "Select Venue";
  placeholder.disabled = true;
  placeholder.hidden = true;
  select.appendChild(placeholder);

  VENUES.forEach(venue => {
    const option = document.createElement("option");
    option.value = venue;
    option.textContent = venue;
    select.appendChild(option);
  });

  select.addEventListener("change", () => {
    const venue = String(select.value || "").trim();
    if (!VENUES.includes(venue)) {
      if (detectedVenue && VENUES.includes(detectedVenue)) {
        select.value = detectedVenue;
      }
      return;
    }
    detectedVenue = venue;
    setVenuePhoto(venue);
  });
}

function getVenuePhotoCandidates(venueName){
  const mapped = String(VENUE_PHOTO_BOOK[venueName] || "").trim();
  if (!mapped) return [];

  const normalized = mapped.replace(/^\.\//, "");
  const fileName = normalized.replace(/^\/+/, "");
  const pathName = String(window.location.pathname || "/");
  const basePath = pathName.endsWith("/")
    ? pathName
    : pathName.slice(0, pathName.lastIndexOf("/") + 1);
  const parts = pathName.split("/").filter(Boolean);
  const repoRoot = parts.length ? `/${parts[0]}/` : "/";

  return Array.from(new Set([
    fileName,
    `./${fileName}`,
    `${basePath}${fileName}`,
    `${repoRoot}${fileName}`,
    `/${fileName}`
  ]));
}

function setImageSourceWithFallback(img, candidates, onSuccess, onFailure){
  if (!img || !Array.isArray(candidates) || !candidates.length) {
    if (typeof onFailure === "function") onFailure();
    return;
  }

  let idx = 0;
  const tryNext = () => {
    if (idx >= candidates.length) {
      if (typeof onFailure === "function") onFailure();
      return;
    }
    const src = candidates[idx++];
    const probe = new Image();
    probe.onload = () => {
      img.src = src;
      if (typeof onSuccess === "function") onSuccess(src);
    };
    probe.onerror = tryNext;
    probe.src = src;
  };

  tryNext();
}

function clearVenueBackground(){
  document.body.classList.remove("has-venue-bg", "bg-layer-a-active", "bg-layer-b-active");
  document.body.style.removeProperty("--venue-bg-image-a");
  document.body.style.removeProperty("--venue-bg-image-b");
  activeVenueBgLayer = "a";
}

function setVenueBackgroundWithFade(src){
  const cleanSrc = String(src || "").trim();
  if (!cleanSrc) {
    clearVenueBackground();
    return;
  }

  const targetLayer = activeVenueBgLayer === "a" ? "b" : "a";
  if (targetLayer === "a") {
    document.body.style.setProperty("--venue-bg-image-a", `url("${cleanSrc}")`);
    document.body.classList.remove("bg-layer-b-active");
    document.body.classList.add("has-venue-bg", "bg-layer-a-active");
  } else {
    document.body.style.setProperty("--venue-bg-image-b", `url("${cleanSrc}")`);
    document.body.classList.remove("bg-layer-a-active");
    document.body.classList.add("has-venue-bg", "bg-layer-b-active");
  }
  activeVenueBgLayer = targetLayer;
}

function setVenuePhoto(venue){
  const card = $("venuePhotoCard");
  const img = $("venuePhoto");
  const label = $("venuePhotoLabel");
  if (!card || !img || !label) return;

  const venueName = String(venue || "").trim();
  if (!venueName) {
    img.removeAttribute("src");
    label.textContent = "";
    card.style.display = "none";
    clearVenueBackground();
    return;
  }

  const photoCandidates = getVenuePhotoCandidates(venueName);
  if (!photoCandidates.length) {
    img.removeAttribute("src");
    label.textContent = `Current Venue: ${venueName}`;
    card.style.display = "none";
    clearVenueBackground();
    return;
  }

  setImageSourceWithFallback(
    img,
    photoCandidates,
    src => {
      card.style.display = "none";
      setVenueBackgroundWithFade(src);
    },
    () => {
      card.style.display = "none";
      clearVenueBackground();
    }
  );
  img.alt = `${venueName} venue photo`;
  label.textContent = `Current Venue: ${venueName}`;
}

function setGateCardVisible(targetCardId, animate = true){

  const hideCard = showCard === pinCard ? venueCard : pinCard;

  pinCard.style.display = "block";
  venueCard.style.display = "block";

  if (!animate) {
    showCard.classList.remove("entering");
    hideCard.classList.remove("entering");
    showCard.classList.remove("is-hidden");
    hideCard.classList.add("is-hidden");
    return;
  }

  showCard.classList.add("entering");
  showCard.classList.remove("is-hidden");
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      showCard.classList.remove("entering");
      hideCard.classList.add("is-hidden");
    });
  });
}

function renderVenueGateButtons(){
  const wrap = $("venueGateButtons");
  if (!wrap) return;
  wrap.innerHTML = "";

  VENUES.forEach(venue => {
    const btn = document.createElement("button");
    const photoCandidates = getVenuePhotoCandidates(venue);

    btn.type = "button";
    btn.className = "pin-venue-option";
    btn.innerHTML = `
      <img class="pin-venue-photo" alt="${escapeHtml(venue)} venue photo">
      <span class="pin-venue-name">${escapeHtml(venue)}</span>
    `;

    const img = btn.querySelector("img");
    if (img && !photoCandidates.length) {
      img.removeAttribute("src");
      img.style.display = "block";
    } else if (img) {
      setImageSourceWithFallback(
        img,
        photoCandidates,
        () => { img.style.display = "block"; },
        () => {
          img.removeAttribute("src");
          img.style.display = "block";
        }
      );
    }

    btn.onclick = async () => {
      const allButtons = [...wrap.querySelectorAll("button.pin-venue-option")];

        button.disabled = true;

      detectedVenue = venue;
      setVenueBadge(`Venue: ${detectedVenue}`);

      unlockAppForManager(authenticatedManagerName);
    };
    wrap.appendChild(btn);
  });

  let unlocking = false;
  let pinErrorFadeTimer = null;
  let pinErrorClearTimer = null;

  const setPinInputsDisabled = disabled => {
    keypad.querySelectorAll("button").forEach(btn => {
      btn.disabled = !!disabled;
    });
  };

  const clearError = () => {
    if (pinErrorFadeTimer) {
      clearTimeout(pinErrorFadeTimer);
      pinErrorFadeTimer = null;
    }
    if (pinErrorClearTimer) {
      clearTimeout(pinErrorClearTimer);
      pinErrorClearTimer = null;

    errorEl.classList.remove("fade-out", "visible");
    errorEl.textContent = "";

  const fadeOutError = () => {
    if (!errorEl.textContent) return;
    if (pinErrorFadeTimer) clearTimeout(pinErrorFadeTimer);
    if (pinErrorClearTimer) clearTimeout(pinErrorClearTimer);
    errorEl.classList.remove("visible");
    errorEl.classList.add("fade-out");

      clearError();
    }, 340);
  };
  const showError = (msg, autoHideMs = 3200) => {
    if (pinErrorFadeTimer) {
      clearTimeout(pinErrorFadeTimer);
      pinErrorFadeTimer = null;
    }
    if (pinErrorClearTimer) {
      clearTimeout(pinErrorClearTimer);
      pinErrorClearTimer = null;
    }
    errorEl.classList.remove("fade-out");
    errorEl.textContent = String(msg || "").trim();
    if (!errorEl.textContent) { clearError(); return; }

    requestAnimationFrame(() => {
      errorEl.classList.add("visible");
    });

    if (autoHideMs <= 0) return;

    const fadeDurationMs = 350;
    const fadeDelayMs = Math.max(0, autoHideMs - fadeDurationMs);
    pinErrorFadeTimer = setTimeout(() => {
      errorEl.classList.remove("visible");
      errorEl.classList.add("fade-out");
    }, fadeDelayMs);
    pinErrorClearTimer = setTimeout(() => {
      clearError();
    }, fadeDelayMs + fadeDurationMs + 40);
  };
  const renderPin = () => {
    const dots = pinDisplay.querySelectorAll(".pin-dot");
    dots.forEach((dot, idx) => {
      dot.classList.toggle("filled", idx < pinValue.length);
    });
  };

  const setPin = value => {
    pinValue = String(value || "").replace(/\D+/g, "").slice(0, 4);
    renderPin();
  };

  const appendDigit = digit => {
    if (!/^\d$/.test(String(digit || ""))) return;
    if (pinValue.length >= 4) return;
    setPin(pinValue + digit);
    fadeOutError();
    if (pinValue.length === 4) {
      tryUnlock();
    }
  };

  const deleteDigit = () => {
    if (!pinValue) return;
    setPin(pinValue.slice(0, -1));
    fadeOutError();
  };

  keypad.addEventListener("click", e => {
    const btn = e.target.closest("button[data-digit]");
    if (!btn) return;
    appendDigit(btn.getAttribute("data-digit"));
  });

  clearBtn.onclick = () => {
    setPin("");
    fadeOutError();
  };

  deleteBtn.onclick = deleteDigit;

  const tryUnlock = async () => {
    if (unlocking) return;
    const pin = String(pinValue || "").trim();
    if (pin.length !== 4) {
      showError("Enter a valid 4-digit PIN.");
      return;
    }

    unlocking = true;
    setPinInputsDisabled(true);
    showError("Verifying PIN...", 0);
    try {
      const auth = await authenticateManagerPin(pin);
      authenticatedManagerName = auth.managerName;
      authenticatedManagerToken = auth.authToken;
      try {
        sessionStorage.setItem(MANAGER_PIN_KEY, auth.managerName);
        sessionStorage.setItem(MANAGER_TOKEN_KEY, auth.authToken);
        sessionStorage.setItem(MANAGER_TOKEN_EXP_KEY, String(auth.expiresAt));
      } catch {}
      setPin("");
      clearError();
      startPostPinVenueFlow(auth.managerName);
    } catch (err) {
      showError(err && err.message ? err.message : "Invalid manager PIN.");
      pinDisplay.classList.add("shake");
      pinDisplay.addEventListener("animationend", () => pinDisplay.classList.remove("shake"), { once: true });
      setPin("");
      unlocking = false;
      setPinInputsDisabled(false);
    }
  };
  document.addEventListener("keydown", e => {
    if (gate.style.display === "none") return;
    const pinCard = $("managerPinCard");
    if (!pinCard || pinCard.classList.contains("is-hidden")) return;

    if (/^\d$/.test(e.key)) {
      e.preventDefault();
      appendDigit(e.key);
      return;
    }

    if (e.key === "Backspace") {
      e.preventDefault();
      deleteDigit();
      return;
    }

    if (e.key === "Escape") {
      e.preventDefault();
      setPin("");
      clearError();
      return;
    }

    if (e.key === "Enter") {
      e.preventDefault();
      tryUnlock();
    }
  });

  let existingManager = "";
  let existingToken = "";
  let existingTokenExp = 0;
  try {
    existingManager = sessionStorage.getItem(MANAGER_PIN_KEY) || "";
    existingToken = sessionStorage.getItem(MANAGER_TOKEN_KEY) || "";
    existingTokenExp = Number(sessionStorage.getItem(MANAGER_TOKEN_EXP_KEY) || 0);
  } catch {}

  const startFreshLogin = () => {
    clearManagerSessionStorage();
    showManagerPinCard(false);
    renderPin();
    document.body.style.overflow = "hidden";
  };

  const tryRestoreSession = async () => {
    if (!existingManager || !existingToken || !Number.isFinite(existingTokenExp) || existingTokenExp <= Date.now()) {
      startFreshLogin();
      return;
    }

    const isValid = await validateManagerSession(existingManager, existingToken);
    if (!isValid) {
      startFreshLogin();
      return;
    }

    authenticatedManagerName = existingManager;
    authenticatedManagerToken = existingToken;
    document.body.style.overflow = "hidden";
    startPostPinVenueFlow(existingManager);
  };

  tryRestoreSession();
  return;
}

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function hasExistingShiftManager(excludeRow = null){
  const body = $("staffBody");
  if (!body) return false;
  return [...body.querySelectorAll("tr")].some(tr => {
    if (excludeRow && tr === excludeRow) return false;
    const role = String(tr.querySelector(".staff-role")?.value || "").trim();
    return role === "Shift Manager";
  });
}

function sortStaffRowsByRole(){
  const body = $("staffBody");
  if (!body) return;

  const roleOrder = {
    "Shift Manager": 0,
    "Bartender": 1,
    "Event Staff": 2
  };

  const rows = [...body.querySelectorAll("tr")];
  rows
    .map((tr, idx) => ({
      tr,
      idx,
      role: String(tr.querySelector(".staff-role")?.value || "Bartender").trim()
    }))
    .sort((a, b) => {
      const aOrder = roleOrder[a.role] ?? 99;
      const bOrder = roleOrder[b.role] ?? 99;
      if (aOrder !== bOrder) return aOrder - bOrder;
      return a.idx - b.idx;
    })
    .forEach(item => body.appendChild(item.tr));
}

function addStaff(role="Bartender", name="", hours="", focusName=true){
  const tr = document.createElement("tr");
  tr.className = "staff-row";
  tr.innerHTML = `
    <td>
      <select class="staff-role">
        <option value="Event Staff">Event Staff</option>
        <option value="Shift Manager">Shift Manager</option>
        <option value="Bartender">Bartender</option>
      </select>
    </td>
    <td><input placeholder="Name" value="${escapeHtml(name)}"></td>
    <td><input class="hours-input" type="number" step="0.25" value="${escapeHtml(hours)}"></td>
    <td class="right"><button class="remove" title="Remove">✕</button></td>
  `;

  const roleSelect = tr.querySelector(".staff-role");
  const inputs = tr.querySelectorAll("input");
  const nameInput = inputs[0];
  const hoursInput = inputs[1];

  const applyRoleBehavior = () => {
    const selectedRole = String(roleSelect.value || "");
    tr.dataset.role = selectedRole;
    const isEvent = selectedRole === "Event Staff";
    if (isEvent) {
      hoursInput.value = "";
      hoursInput.disabled = true;
      hoursInput.placeholder = "—";
    } else {
      hoursInput.disabled = false;
      hoursInput.placeholder = "0";
    }
  };

  const normalizedRole = ["Event Staff", "Shift Manager", "Bartender"].includes(role) ? role : "Bartender";
  roleSelect.value = normalizedRole === "Shift Manager" && hasExistingShiftManager(tr) ? "Bartender" : normalizedRole;
  let previousRole = roleSelect.value;

  roleSelect.addEventListener("change", () => {
    const nextRole = String(roleSelect.value || "");
    if (nextRole === "Shift Manager" && hasExistingShiftManager(tr)) {
      roleSelect.value = previousRole;
      showToast("Only one Shift Manager allowed.");
      setStatus("Only one Shift Manager is allowed.", "error");
      applyRoleBehavior();
      return;
    }

    previousRole = roleSelect.value;
    applyRoleBehavior();
    sortStaffRowsByRole();
    markUncalculated();
    saveDraft();
  });

  applyRoleBehavior();

  enableNameAutocomplete(nameInput);
  enableArrowBoxNavigation(nameInput);
  enableArrowBoxNavigation(hoursInput);
  enforceLettersOnly(nameInput);
  tr.querySelector("button").onclick = () => {
    tr.remove();
    sortStaffRowsByRole();
    markUncalculated();
    saveDraft();
  };
  $("staffBody").appendChild(tr);
  sortStaffRowsByRole();
  if (focusName) nameInput.focus();
  markUncalculated();
  saveDraft();
}

function getUnifiedStaffRows(){
  const body = $("staffBody");
  if (!body) return [];

  return [...body.querySelectorAll("tr")].map((tr, idx) => {
    const role = String(tr.querySelector(".staff-role")?.value || "Bartender").trim();
    const inputs = tr.querySelectorAll("input");
    const name = normalizeName(inputs[0]?.value || "");
    const hoursRaw = inputs[1]?.value || "";
    const hours = role === "Event Staff" ? 0 : (+hoursRaw || 0);

    return { role, name, hours, tr, inputs };
  });
}

function showToast(message){
  const toast = $("quickToast");
  if (!toast) return;
  toast.textContent = String(message || "").trim();
  if (!toast.textContent) return;

  toast.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.remove("show");
  }, 1500);
}

function markUncalculated(){
  latestReceipt = null;
  if ($("resultsBody").children.length === 0){
    setElementVisible($("resultsCard"), true);
    setElementVisible($("resultsEmpty"), true);
  }
}

function enforceMoneyInput(input){
  input.addEventListener("input", () => {
    const digits = String(input.value || "").replace(/\D+/g, "");
    input.value = "$" + (digits ? Number(digits).toLocaleString() : "");
  });

  input.addEventListener("focus", () => {
    if (!input.value) input.value = "$";
  });
}

function getPotNumber(){
  return Math.floor(+(String($("pot").value || "").replace(/[^0-9]/g, "") || 0));
}

function enforceLettersOnly(input){
  input.addEventListener("input", () => {
    input.value = sanitizeNameInput(input.value || "");
  });
}

function enableNameAutocomplete(input){
  input.setAttribute("autocomplete", "off");
  input.addEventListener("focus", () => {
    updateNameSuggestions(input.value || "", input);
  });
  input.addEventListener("input", () => {
    updateNameSuggestions(input.value || "", input);
  });
  input.addEventListener("keydown", e => {
    if (!activeNameSuggestions.length || activeNameInput !== input) return;

    if (e.key === "Tab") {
      e.preventDefault();
      moveNameSuggestionHighlight(e.shiftKey ? -1 : 1);
      return;
    }

    if (e.key === "ArrowDown") {
      e.preventDefault();
      moveNameSuggestionHighlight(1);
      return;
    }

    if (e.key === "ArrowUp") {
      e.preventDefault();
      moveNameSuggestionHighlight(-1);
      return;
    }

    if (e.key === "Enter") {
      e.preventDefault();
      applyNameSuggestion(activeNameSuggestionIndex >= 0 ? activeNameSuggestionIndex : 0);
      return;
    }

    if (e.key === "Escape") {
      hideNameSuggestionMenu();
    }
  });
  input.addEventListener("blur", () => {
    setTimeout(hideNameSuggestionMenu, 100);
    autoFillUniqueFirstName(input);
  });
}

function autoFillUniqueFirstName(input){
  const raw = normalizeName(input.value || "");
  if (!raw) return;

  const query = raw.toLowerCase();
  const matches = STAFF_NAMES.filter(name => {
    return String(name || "").toLowerCase().startsWith(query);
  });

  if (matches.length === 1) {
    input.value = matches[0];
    saveDraft();
  }
}

function initNameSuggestions(){
  if ($("nameSuggestionMenu")) return;

  const menu = document.createElement("div");
  menu.id = "nameSuggestionMenu";
  menu.className = "name-suggestion-menu";
  document.body.appendChild(menu);
}

function getNameMatches(query){
  const text = String(query || "").trim().toLowerCase();
  if (!text) return [];

  return STAFF_NAMES
    .filter(name => name.toLowerCase().startsWith(text))
    .slice(0, 12);
}

function updateNameSuggestions(query, input){
  const menu = $("nameSuggestionMenu");
  if (!menu || !input) return;

  const matches = getNameMatches(query);
  if (!matches.length) {
    hideNameSuggestionMenu();
    return;
  }

  activeNameInput = input;
  activeNameSuggestions = matches;
  activeNameSuggestionIndex = 0;

  renderNameSuggestionMenu();
  positionNameSuggestionMenu(input);
}

function renderNameSuggestionMenu(){
  const menu = $("nameSuggestionMenu");
  if (!menu || !activeNameSuggestions.length) {
    hideNameSuggestionMenu();
    return;
  }

  menu.innerHTML = "";

  activeNameSuggestions.forEach((name, idx) => {
    const item = document.createElement("button");
    item.type = "button";
    item.className = "name-suggestion-item" + (idx === activeNameSuggestionIndex ? " active" : "");
    item.textContent = name;
    item.tabIndex = -1;
    item.onmousedown = e => e.preventDefault();
    item.onclick = () => applyNameSuggestion(idx);
    menu.appendChild(item);
  });

  menu.style.display = "block";
}

function positionNameSuggestionMenu(input){
  const menu = $("nameSuggestionMenu");
  if (!menu || !input) return;

  const rect = input.getBoundingClientRect();
  const left = rect.left + window.scrollX;
  const top = rect.bottom + 4 + window.scrollY;
  menu.style.left = `${left}px`;
  menu.style.top = `${top}px`;
  menu.style.width = `${rect.width}px`;
}

function moveNameSuggestionHighlight(delta){
  if (!activeNameSuggestions.length) return;

  const len = activeNameSuggestions.length;
  activeNameSuggestionIndex = (activeNameSuggestionIndex + delta + len) % len;
  renderNameSuggestionMenu();
}

function applyNameSuggestion(idx){
  if (!activeNameInput) return;
  const name = activeNameSuggestions[idx];
  if (!name) return;

  activeNameInput.value = name;
  saveDraft();
  hideNameSuggestionMenu();
}

function hideNameSuggestionMenu(){
  const menu = $("nameSuggestionMenu");
  if (menu) {
    menu.style.display = "none";
    menu.innerHTML = "";
  }
  activeNameSuggestions = [];
  activeNameSuggestionIndex = -1;
  activeNameInput = null;
}

function moveBoxFocusByArrow(currentInput, key){
  const row = currentInput.closest("tr");
  const tbody = currentInput.closest("tbody");
  if (!row || !tbody) return;

  const rows = [...tbody.querySelectorAll("tr")];
  const rowIndex = rows.indexOf(row);
  if (rowIndex < 0) return;

  const currentInputs = [...row.querySelectorAll("input")];
  const colIndex = currentInputs.indexOf(currentInput);
  if (colIndex < 0) return;

  if (key === "ArrowLeft" || key === "ArrowRight") {
    const targetCol = key === "ArrowLeft" ? colIndex - 1 : colIndex + 1;
    if (targetCol < 0 || targetCol >= currentInputs.length) return;
    const target = currentInputs[targetCol];
    target.focus();
    if (typeof target.select === "function") target.select();
    return;
  }

  if (key === "ArrowUp" || key === "ArrowDown") {
    const targetRowIndex = key === "ArrowUp" ? rowIndex - 1 : rowIndex + 1;
    if (targetRowIndex < 0 || targetRowIndex >= rows.length) return;
    const targetInputs = [...rows[targetRowIndex].querySelectorAll("input")];
    if (!targetInputs.length) return;

    const safeColIndex = Math.min(colIndex, targetInputs.length - 1);
    const target = targetInputs[safeColIndex];
    target.focus();
    if (typeof target.select === "function") target.select();
  }
}

function enableArrowBoxNavigation(input){
  input.addEventListener("keydown", e => {
    if (!["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) return;

    const tbody = input.closest("tbody");
    if (!tbody || tbody.id !== "staffBody") return;

    if (
      (e.key === "ArrowUp" || e.key === "ArrowDown") &&
      activeNameSuggestions.length &&
      activeNameInput === input
    ) {
      return;
    }

    e.preventDefault();
    moveBoxFocusByArrow(input, e.key);
  });
}

function sanitizeNameInput(value){
  return String(value || "").replace(/[^A-Za-z\s'’\-]/g, "");
}

function normalizeName(value){
  return sanitizeNameInput(value)
    .replace(/\s+/g, " ")
    .replace(/-{2,}/g, "-")
    .replace(/'{2,}/g, "'")
    .trim();
}

function isValidTypedName(value){
  const letters = String(value || "").replace(/[^A-Za-z]/g, "");
  return letters.length >= 2;
}

function getMissingCalculationMessage(){
  const missing = [];
  const pushMissing = item => {
    const text = String(item || "").trim();
    if (!text || missing.includes(text)) return;
    missing.push(text);
  };

  const pot = getPotNumber();
  if (pot <= 0) pushMissing("tip pot");

  const staffRows = getUnifiedStaffRows();
  if (!staffRows.length) {
    pushMissing("staff");
  } else {
    let hasMissingName = false;
    let hasMissingHours = false;
    let hasInvalidName = false;

    staffRows.forEach((row, idx) => {
      const role = ["Event Staff", "Shift Manager", "Bartender"].includes(row.role) ? row.role : "Bartender";
      const cleanedName = normalizeName(row.inputs[0]?.value || row.name || "");

      if (!cleanedName) {
        hasMissingName = true;
      } else if (!isValidTypedName(cleanedName)) {
        hasInvalidName = true;
      }

      if (role !== "Event Staff") {
        const hoursValue = +String(row.inputs[1]?.value || "").trim() || 0;
        if (hoursValue <= 0) {
          hasMissingHours = true;
        }
      }
    });

    if (hasMissingName) pushMissing("staff names");
    if (hasInvalidName) pushMissing("valid staff names");
    if (hasMissingHours) pushMissing("staff hours");

    const hasPayoutRow = staffRows.some(row => row.role !== "Event Staff" && (+row.inputs[1]?.value || 0) > 0);
    if (!hasPayoutRow) pushMissing("staff hours");
  }

  return missing.length ? `Missing: ${missing.join(" & ")}.` : "";
}

function getDraft(){
  const staff = getUnifiedStaffRows().map(row => ({
    role: row.role,
    name: row.name,
    hours: row.role === "Event Staff" ? "" : String(row.hours || "")
  }));

  return {
    pot: $("pot").value || "",
    notes: $("notes").value || "",
    staff
  };
}

function saveDraft(){
  try {
    localStorage.setItem(DRAFT_KEY, JSON.stringify(getDraft()));
  } catch {}
}

function clearDraft(){
  try {
    localStorage.removeItem(DRAFT_KEY);
  } catch {}
}

function restoreDraft(){
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if (!raw) return false;

    const draft = JSON.parse(raw);
    if (!draft || typeof draft !== "object") return false;

    const potDigits = String(draft.pot || "").replace(/\D+/g, "");
    $("pot").value = "$" + (potDigits ? Number(potDigits).toLocaleString() : "");
    $("notes").value = String(draft.notes || "");

    $("staffBody").innerHTML = "";

    if (Array.isArray(draft.staff)) {
      draft.staff.forEach(row => {
        const role = String(row?.role || "Bartender");
        const name = normalizeName(row?.name || "");
        const hours = role === "Event Staff" ? "" : (row?.hours || "");
        addStaff(role, name, hours, false);
      });
    } else {
      const events = Array.isArray(draft.eventStaff) ? draft.eventStaff : [];
      const shift = draft.shiftManager && typeof draft.shiftManager === "object" ? draft.shiftManager : {};
      const bartenders = Array.isArray(draft.bartenders) ? draft.bartenders : [];

      events.forEach(name => addStaff("Event Staff", normalizeName(name), "", false));
      if (shift.name || shift.hours) {
        addStaff("Shift Manager", normalizeName(shift.name || ""), shift.hours || "", false);
      }
      bartenders.forEach(b => addStaff("Bartender", normalizeName(b.name || ""), b.hours || "", false));
    }

    if (!$("staffBody").children.length) {
      addStaff("Bartender", "", "", false);
    }

    return true;
  } catch {
    return false;
  }
}

function todayLocalISO(){
  const d = new Date();
  const tzOffset = d.getTimezoneOffset() * 60000;
  return new Date(d.getTime() - tzOffset).toISOString().slice(0,10);
}

function setStatus(msg, type="", options = {}){
  const el = $("sendStatus");
  if (statusFadeTimer) {
    clearTimeout(statusFadeTimer);
    statusFadeTimer = null;
  }
  if (statusClearTimer) {
    clearTimeout(statusClearTimer);
    statusClearTimer = null;
  }
  el.classList.remove("fade-out");
  el.style.opacity = "1";
  el.textContent = msg;
  el.className = `status ${type}`.trim();

  const autoHideMs = Number(
    options?.autoHideMs ?? (type === "error" ? 3200 : 0)
  );
  if (!msg || autoHideMs <= 0) return;

  const fadeDurationMs = 350;
  const fadeDelayMs = Math.max(0, autoHideMs - fadeDurationMs);
  statusFadeTimer = setTimeout(() => {
    el.style.transition = `opacity ${fadeDurationMs}ms var(--motion-ease)`;
    el.style.opacity = "0";
    el.classList.add("fade-out");
  }, fadeDelayMs);
  statusClearTimer = setTimeout(() => {
    setStatus("");
  }, fadeDelayMs + fadeDurationMs + 40);
}

function setSendLoading(isLoading){
  const bar = $("sendLoading");
  if (!bar) return;
  setLoadingVisibleWithMinimum(bar, isLoading);
}

function hideVenuePicker(){
  const picker = $("venuePicker");
  const buttons = $("venueButtons");
  buttons.innerHTML = "";
  setElementVisible(picker, false, "block", VENUE_PICKER_TRANSITION_MS);
}

function pickVenue(){
  return new Promise(resolve => {
    const picker = $("venuePicker");
    const buttons = $("venueButtons");
    buttons.innerHTML = "";

    VENUES.forEach(venue => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = venue;

  });
}



async function postToAppsScript(endpoint, payload){
  const json = JSON.stringify(payload);

  const res = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=UTF-8" },
    body: json
  });

  const text = await res.text();
  let data = {};
  try {
    data = text ? JSON.parse(text) : {};
  } catch {
    throw new Error("Backend returned an unreadable response.");
  }

  if (!res.ok || !data.ok) {
    throw new Error(data.error || `Send failed (HTTP ${res.status}).`);
  }

  return data;
}

async function authenticateManagerPin(pin){
  const cleanPin = String(pin || "").replace(/\D+/g, "").slice(0, 4);
  if (cleanPin.length !== 4) {
    throw new Error("Enter a valid 4-digit PIN.");
  }

  const data = await postToAppsScript(RECEIPT_ENDPOINT, {
    action: "authManagerPin",
    pin: cleanPin
  });

  const managerName = String(data.managerName || "").trim();
  const authToken = String(data.authToken || "").trim();
  const expiresAt = Number(data.expiresAt || 0);
  if (!managerName || !authToken || !Number.isFinite(expiresAt) || expiresAt <= 0) {
    throw new Error("Authentication response was incomplete.");
  }

  return { managerName, authToken, expiresAt };
}

async function validateManagerSession(name, token){
  const managerName = String(name || "").trim();
  const authToken = String(token || "").trim();
  if (!managerName || !authToken) return false;

  try {
    const data = await postToAppsScript(RECEIPT_ENDPOINT, {
      action: "validateManagerSession",
      managerName,
      authToken
    });
    return !!data.valid;
  } catch {
    return false;
  }
}

function clearManagerSessionStorage(){
  authenticatedManagerName = "";
  authenticatedManagerToken = "";
  try {
    sessionStorage.removeItem(MANAGER_PIN_KEY);
    sessionStorage.removeItem(MANAGER_TOKEN_KEY);
    sessionStorage.removeItem(MANAGER_TOKEN_EXP_KEY);
  } catch {}
}

async function sendReceipt(){
  if (sendingReceipt) return;
  if (!latestReceipt){
    showToast("Calculate first.");
    setStatus("Calculate first.", "error");
    return;
  }
  setStatus("");
  setSendLoading(false);
  hideVenuePicker();

  let venue = detectedVenue;
  if (!VENUES.includes(String(venue || "").trim())) {
    venue = getSelectedVenueValue();
  }
  if (!venue) {
    setStatus("Please choose your venue.", "error");
    venue = await pickVenue();
    if (venue) {
      detectedVenue = venue;
      setVenueBadge(`Venue: ${detectedVenue}`);
      setVenuePhoto(detectedVenue);
    }
  }
  if (!venue){
    setStatus("Send canceled or invalid venue selection.", "error");
    return;
  }

  const managerName = String(authenticatedManagerName || "").trim();
  const authToken = String(authenticatedManagerToken || "").trim();
  if (!managerName || !authToken) {
    setStatus("Manager session expired. Please re-enter your PIN.", "error");
    clearManagerSessionStorage();
    showManagerPinCard(false);
    return;
  }

  const receipt = {
    ...latestReceipt,
    date: todayLocalISO(),
    venue,
    notes: ($("notes").value || "").trim(),
    submittedAt: new Date().toISOString(),
    managerName,
    authToken
  };

  if (!RECEIPT_ENDPOINT){
    setStatus("Receipt is ready. Backend needs Google Apps Script Web App URL ending in /exec.", "error");
    return;
  }

  if (!RECEIPT_ENDPOINT.includes("/exec")){
    setStatus("Configured backend URL is invalid. Use the Apps Script Web App /exec URL.", "error");
    return;
  }

  try {
    sendingReceipt = true;
    setSendLoading(true);
    setStatus("Sending receipt...", "");
    const response = await postToAppsScript(RECEIPT_ENDPOINT, receipt);
    if (Number(response.replacedRows || 0) > 0){
      setStatus("Receipt updated and sent!", "success");
    } else {
      setStatus("Receipt sent!", "success");
    }
  } catch (err) {
    const msg = err && err.message ? err.message : "Send failed. Verify Apps Script deployment and access to the shared sheet.";
    if (/session expired|invalid auth|unauthorized/i.test(msg)) {
      clearManagerSessionStorage();
      showManagerPinCard(false);
    }
    setStatus(msg, "error");
  } finally {
    sendingReceipt = false;
    setSendLoading(false);
  }
}

  $("staffBody").innerHTML = "";
  $("resultsBody").innerHTML = "";

  setSendLoading(false);
  setStatus("");
  clearDraft();
  addStaff("Bartender", "", "", false);
}

$("calc").onclick = () => {
  const missingMessage = getMissingCalculationMessage();
  if (missingMessage) {
    showToast(missingMessage);
    setStatus(missingMessage, "error", { autoHideMs: 3200 });
    return;
  }

  $("resultsBody").innerHTML = "";
  setElementVisible($("resultsCard"), true);
  setElementVisible($("resultsEmpty"), false);
  latestReceipt = null;
  setStatus("");

  const pot = getPotNumber();
  if (pot <= 0) return;

  let hasInvalidName = false;
  const staffRows = getUnifiedStaffRows();
  const roleCounts = { "Event Staff": 0, "Shift Manager": 0, "Bartender": 0 };
  const normalizedRows = staffRows.map(row => {
    const role = ["Event Staff", "Shift Manager", "Bartender"].includes(row.role) ? row.role : "Bartender";
    roleCounts[role] = (roleCounts[role] || 0) + 1;

    const cleanedName = normalizeName(row.inputs[0]?.value || row.name || "");
    row.inputs[0].value = cleanedName;
    if (cleanedName && !isValidTypedName(cleanedName)) {
      hasInvalidName = true;
    }

    const fallbackName = `${role} ${roleCounts[role]}`;
    return {
      role,
      name: cleanedName || fallbackName,
      hours: role === "Event Staff" ? 0 : (+row.inputs[1]?.value || 0)
    };
  });

  const eventStaff = normalizedRows.filter(r => r.role === "Event Staff").map(r => r.name);
  const payoutPeople = normalizedRows.filter(r => r.role !== "Event Staff" && r.hours > 0);

  if ((roleCounts["Shift Manager"] || 0) > 1) {
    setStatus("Only one Shift Manager is allowed.", "error");
    return;
  }

  if (hasInvalidName) {
    setStatus("Names must contain at least 2 letters.", "error");
    return;
  }

  if (!payoutPeople.length) return;

  // Event Staff total = 10% each
  const eventEach = eventStaff.length ? Math.floor(pot * EVENT_STAFF_PCT_EACH) : 0;
  const eventTotal = eventEach * eventStaff.length;

  const remaining = Math.max(0, pot - eventTotal);

  const totalHours = payoutPeople.reduce((s,b)=>s+b.hours,0);
  if (totalHours <= 0) return;

  // ✅ Base bartender rate, rounded to 2 decimals (display + calculation match)
  const baseRateRaw = remaining / totalHours;
  const baseRate = Math.round(baseRateRaw * 100) / 100;

  const body = $("resultsBody");
  const entries = [];

  // Event Staff rows
  eventStaff.forEach(name => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${escapeHtml(name)}</td>
      <td class="right">—</td>
      <td class="right"><b>${moneyWhole(eventEach)}</b></td>
    `;
    body.appendChild(tr);

    entries.push({
      role: "Event Staff",
      name,
      hours: null,
      rate: null,
      tipout: Math.floor(eventEach)
    });
  });

  // Shift Manager + Bartender rows (tipout uses rounded baseRate)
  payoutPeople.forEach(b => {
    const tipout = Math.floor(b.hours * baseRate);
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${escapeHtml(b.name)}</td>
      <td class="right">${moneyRate(baseRate)}</td>
      <td class="right"><b>${moneyWhole(tipout)}</b></td>
    `;
    body.appendChild(tr);

    entries.push({
      role: b.role,
      name: b.name,
      hours: b.hours,
      rate: baseRate,
      tipout
    });
  });

  latestReceipt = {
    totalPot: pot,
    eventStaffCount: eventStaff.length,
    bartenderCount: payoutPeople.length,
    remainingForBartenders: remaining,
    bartenderRate: baseRate,
    entries
  };

  setElementVisible($("resultsCard"), true);
  setElementVisible($("resultsEmpty"), false);
  saveDraft();
  setStatus("Calculated. Sending receipt...", "success");
  sendReceipt();
};
</script>
