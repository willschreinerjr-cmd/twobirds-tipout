<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TwoBirds Tipout</title>

  <style>
    :root{
      --bg:#f6f7f9; --card:#fff; --border:#e5e7eb; --text:#111827; --muted:#6b7280;
      --green:#1f9d55; --green-dark:#178a48;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:var(--venue-bg-image, none);
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      opacity:0;
      transition:opacity .25s ease;
      pointer-events:none;
      z-index:0;
    }
    body.has-venue-bg::before{ opacity:0.25; }
    .app{ max-width:1200px; margin:0 auto; padding:24px 20px; position:relative; z-index:1; }

    header{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:20px; }
    .brand{ display:flex; align-items:center; gap:14px; }
    .logo-wrap{
      background:#fff; border:1px solid var(--border); border-radius:16px; padding:10px 12px;
      box-shadow:0 6px 18px rgba(0,0,0,0.04); display:flex; align-items:center;
    }
    .logo{ height:42px; width:auto; display:block; object-fit:contain; }
    h1{ margin:0; font-size:28px; font-weight:900; letter-spacing:-0.5px; }
    .subtitle{ color:#4b5563; font-size:14px; font-weight:700; margin-top:4px; }
    .manager-welcome{
      background:#fff;
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 14px;
      font-size:14px;
      font-weight:700;
      color:#065f46;
      box-shadow:0 6px 18px rgba(0,0,0,0.04);
      white-space:nowrap;
      display:none;
    }
    .header-meta{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .venue-select-wrap{
      position:relative;
      display:none;
      align-items:center;
      background:#fff;
      border:1px solid var(--border);
      border-radius:999px;
      box-shadow:0 6px 18px rgba(0,0,0,0.04);
      padding-left:58px;
      min-width:210px;
    }
    .venue-prefix{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      font-size:14px;
      font-weight:700;
      color:#1f2937;
      pointer-events:none;
      white-space:nowrap;
    }
    .venue-select{
      background:transparent;
      border:0;
      border-radius:999px;
      padding:10px 14px 10px 0;
      min-width:150px;
      font-size:14px;
      font-weight:700;
      color:#1f2937;
      white-space:nowrap;
      display:inline-flex;
      outline:none;
      cursor:pointer;
      appearance:auto;
    }
    .venue-photo-card{
      display:none;
      padding:12px;
    }
    .venue-photo-wrap{
      width:100%;
      border-radius:14px;
      overflow:hidden;
      border:1px solid var(--border);
      background:#f3f4f6;
    }
    .venue-photo{
      width:100%;
      height:220px;
      object-fit:cover;
      display:block;
    }
    .venue-photo-label{
      margin:10px 2px 2px;
      font-size:14px;
      font-weight:700;
      color:#1f2937;
    }

    .pin-gate{
      position:fixed;
      inset:0;
      z-index:10000;
      background:#f6f7f9;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
    }
    .pin-gate-card{
      width:100%;
      max-width:560px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:24px;
      padding:28px;
      box-shadow:0 16px 40px rgba(0,0,0,0.08);
      text-align:center;
      max-height:calc(100dvh - 40px);
      overflow-y:auto;
    }
    .pin-gate-logo-row{
      display:flex;
      justify-content:center;
      margin-bottom:12px;
    }
    .pin-gate-logo{
      height:52px;
      width:auto;
      display:block;
      object-fit:contain;
    }
    .pin-gate-title{
      margin:0;
      font-size:34px;
      font-weight:900;
      letter-spacing:-0.6px;
    }
    .pin-gate-subtitle{
      margin:10px 0 18px;
      color:var(--muted);
      font-size:16px;
      font-weight:600;
    }
    .pin-gate-greeting{
      margin:8px 0 4px;
      color:#1f2937;
      font-size:17px;
      font-weight:700;
    }
    .pin-display{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:2px 0 16px;
    }
    .pin-dot{
      width:16px;
      height:16px;
      border-radius:50%;
      border:2px solid #9ca3af;
      background:transparent;
    }
    .pin-dot.filled{
      border-color:var(--green);
      background:var(--green);
    }
    .pin-keypad{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:10px;
      max-width:300px;
      margin:0 auto;
    }
    .pin-key{
      min-height:52px;
      font-size:22px;
      font-weight:800;
      padding:0;
    }
    .pin-key.action{
      font-size:14px;
      font-weight:700;
      padding:12px 8px;
    }
    .pin-gate-error{
      min-height:22px;
      margin-top:14px;
      color:#b91c1c;
      font-weight:700;
      font-size:14px;
    }
    .pin-venue-buttons{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:10px;
      margin-top:10px;
    }
    .venue-gate-loading{
      display:none;
      width:100%;
      height:10px;
      border-radius:999px;
      background:#e5e7eb;
      overflow:hidden;
      margin:6px 0 4px;
    }
    .venue-gate-loading-bar{
      width:40%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#1f9d55,#34d399);
      animation:venueLoad 1s ease-in-out infinite;
      transform:translateX(-100%);
    }
    @keyframes venueLoad{
      0%{ transform:translateX(-100%); }
      100%{ transform:translateX(250%); }
    }
    .pin-venue-option{
      position:relative;
      overflow:hidden;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      min-height:150px;
      padding:0;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
    }
    .pin-venue-option:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 24px rgba(0,0,0,0.16);
    }
    .pin-venue-option:active{
      transform:translateY(0);
    }
    .pin-venue-option::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(0,0,0,0.15) 0%,rgba(0,0,0,0.55) 100%);
      pointer-events:none;
    }
    .pin-venue-photo{
      width:100%;
      height:150px;
      object-fit:cover;
      display:block;
      background:#eef0f3;
    }
    .pin-venue-name{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:1;
      display:block;
      width:100%;
      padding:14px 12px;
      text-align:center;
      font-size:24px;
      font-weight:900;
      color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,0.65);
      letter-spacing:0.2px;
    }

    @media (max-width: 720px){
      .pin-gate{
        align-items:flex-start;
        padding:10px;
      }
      .pin-gate-card{
        padding:18px;
        border-radius:18px;
        max-height:calc(100dvh - 20px);
      }
      .pin-venue-buttons{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:8px;
      }
      .pin-venue-option{ min-height:110px; }
      .pin-venue-photo{ height:110px; }
      .pin-venue-name{ font-size:18px; padding:10px 8px; }
    }

    .card{
      background:var(--card); border:1px solid var(--border); border-radius:18px; padding:22px; margin-bottom:18px;
      box-shadow:0 8px 22px rgba(0,0,0,0.04);
    }
    .app > .card:first-of-type{
      box-shadow:0 10px 26px rgba(0,0,0,0.06);
      border-color:#dfe3e8;
    }
    label{ display:block; font-weight:700; margin-bottom:6px; font-size:14px; }
    input{ width:100%; padding:14px 16px; font-size:18px; border-radius:14px; border:1px solid var(--border); outline:none; }
    input:focus{ border-color:var(--green); }
    .staff-role{
      width:100%;
      padding:10px 12px;
      font-size:14px;
      font-weight:700;
      border-radius:12px;
      border:1px solid var(--border);
      background:#fff;
      color:#1f2937;
      outline:none;
    }
    .staff-role:focus{ border-color:var(--green); }
    .staff-row[data-role="Event Staff"] .staff-role{
      background:#fafafa;
      border-color:#9ca3af;
      color:#4b5563;
    }
    .staff-row[data-role="Shift Manager"] .staff-role{
      background:#f3f4f6;
      border-color:var(--green);
      color:#065f46;
    }
    .staff-row[data-role="Bartender"] .staff-role{
      background:#fff;
      border-color:#111827;
      color:#111827;
    }
    .staff-row[data-role="Event Staff"] td:first-child{ box-shadow:inset 3px 0 0 #9ca3af; }
    .staff-row[data-role="Shift Manager"] td:first-child{ box-shadow:inset 3px 0 0 var(--green-dark); }
    .staff-row[data-role="Bartender"] td:first-child{ box-shadow:inset 3px 0 0 #111827; }
    .hours-input:disabled{
      background:#f3f4f6;
      color:#9ca3af;
      cursor:not-allowed;
    }
    textarea{ width:100%; padding:12px 14px; font-size:15px; border-radius:14px; border:1px solid var(--border); outline:none; resize:vertical; min-height:84px; font-family:inherit; }
    textarea:focus{ border-color:var(--green); }

    .row{ display:flex; gap:14px; flex-wrap:wrap; align-items:end; }
    .row > *{ flex:1; min-width:220px; }
    .actions{ gap:12px; }
    .actions button{ min-height:48px; }

    .status{ font-size:13px; color:var(--muted); margin-top:10px; min-height:18px; }
    .status.success{ color:var(--green-dark); }
    .status.error{ color:#b91c1c; }
    .send-loading{
      display:none;
      width:100%;
      height:10px;
      border-radius:999px;
      background:#e5e7eb;
      overflow:hidden;
      margin-top:10px;
    }
    .send-loading-bar{
      width:40%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#1f9d55,#34d399);
      animation:sendLoad 1s ease-in-out infinite;
      transform:translateX(-100%);
    }
    @keyframes sendLoad{
      0%{ transform:translateX(-100%); }
      100%{ transform:translateX(250%); }
    }

    button{
      padding:14px 18px; font-size:16px; border-radius:14px; border:1px solid var(--border);
      background:#f4f5f7; color:#1f2937; cursor:pointer; font-weight:700;
      transition:background-color .15s ease, border-color .15s ease, transform .08s ease;
    }
    button:hover{ background:#eef0f3; }
    button:active{ transform:translateY(1px); }
    button.primary{ background:var(--green); color:#fff; border-color:var(--green); }
    button.primary:hover{ background:var(--green-dark); }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    button.primary:disabled{ background:#9ca3af; border-color:#9ca3af; }
    button.reset{ background:#eef0f3; }
    .venue-picker{ margin-top:12px; padding:12px; border:1px solid var(--border); border-radius:14px; background:#fafafa; }
    .venue-actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
    .venue-actions button{ padding:10px 14px; font-size:14px; }
    .venue-actions .cancel{ background:#eef0f3; }

    table{ width:100%; border-collapse:collapse; margin-top:6px; }
    th{ text-align:left; font-size:13px; color:#374151; font-weight:800; padding-bottom:8px; }
    td{ padding:11px 0; border-bottom:1px solid var(--border); }
    th.right, td.right{ text-align:right; }

    .remove{
      background:none; border:none; font-size:18px; cursor:pointer; color:#9ca3af;
      padding:8px 10px; border-radius:12px;
    }
    .remove:hover{ color:#ef4444; background:#fff5f5; }

    .results-card{ background:linear-gradient(180deg,#ffffff,#f9fafb); }
    .results-empty{ color:var(--muted); font-size:14px; padding:12px 2px; }
    .results-card thead th:nth-child(2),
    .results-card tbody td:nth-child(2){ text-align:center; }

    .name-suggestion-menu{
      position:absolute;
      z-index:9999;
      display:none;
      max-height:240px;
      overflow:auto;
      background:#fff;
      border:1px solid var(--border);
      border-radius:12px;
      box-shadow:0 8px 24px rgba(0,0,0,0.08);
    }
    .name-suggestion-item{
      width:100%;
      text-align:left;
      border:0;
      border-bottom:1px solid #f3f4f6;
      background:#fff;
      padding:10px 12px;
      font-size:14px;
      font-weight:600;
      color:#111827;
      cursor:pointer;
    }
    .name-suggestion-item:last-child{ border-bottom:0; }
    .name-suggestion-item.active,
    .name-suggestion-item:hover{
      background:#eef6ff;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translate(-50%, 12px);
      background:#111827;
      color:#fff;
      font-size:13px;
      font-weight:700;
      padding:10px 14px;
      border-radius:999px;
      box-shadow:0 10px 24px rgba(0,0,0,0.25);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
      z-index:20000;
      white-space:nowrap;
    }
    .toast.show{
      opacity:1;
      transform:translate(-50%, 0);
    }

    @media (max-width: 720px){
      .app{ padding:12px; }
      header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
      }
      .brand{
        width:100%;
        gap:10px;
      }
      .logo-wrap{
        padding:8px 10px;
        border-radius:12px;
      }
      .logo{ height:34px; }
      h1{ font-size:24px; }
      .subtitle{ font-size:13px; }
      .header-meta{
        width:100%;
        justify-content:flex-start;
      }
      .manager-welcome{
        width:100%;
        border-radius:14px;
        white-space:normal;
      }
      .venue-select-wrap{
        width:100%;
        min-width:0;
        padding-left:64px;
      }
      .venue-prefix{
        left:12px;
        font-size:12px;
      }
      .venue-select{
        width:100%;
        min-width:0;
        padding:10px 10px 10px 0;
        font-size:13px;
      }
      .card{
        padding:14px;
        border-radius:14px;
      }
      .row{
        flex-direction:column;
        align-items:stretch;
        gap:10px;
      }
      .row > *{
        min-width:0;
        width:100%;
      }
      input{
        font-size:16px;
        padding:12px 14px;
      }
      textarea{
        font-size:14px;
        padding:10px 12px;
      }
      .actions{ gap:8px; }
      .actions button{
        flex:1 1 100%;
        width:100%;
        min-width:0;
        padding:12px 12px;
      }
      table{
        display:block;
        width:100%;
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
      }
      th, td{ white-space:nowrap; }
      .results-card th,
      .results-card td{
        padding-left:10px;
        padding-right:10px;
      }
      .results-card th:first-child,
      .results-card td:first-child{
        padding-left:0;
      }
    }
  </style>
</head>

<body>
  <div id="pinGate" class="pin-gate">
    <div id="managerPinCard" class="pin-gate-card">
      <div class="pin-gate-logo-row">
        <img class="pin-gate-logo" src="TwoBirdsLogo_Lockup_Black.webp" alt="TwoBirds Event Group">
      </div>
      <h2 class="pin-gate-title">Manager PIN Required</h2>
      <p class="pin-gate-subtitle">Enter your 4-digit manager PIN to continue.</p>
      <div id="managerPinDisplay" class="pin-display" aria-label="PIN entry status">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>
      <div id="managerKeypad" class="pin-keypad" aria-label="Manager PIN keypad">
        <button type="button" class="pin-key" data-digit="1">1</button>
        <button type="button" class="pin-key" data-digit="2">2</button>
        <button type="button" class="pin-key" data-digit="3">3</button>
        <button type="button" class="pin-key" data-digit="4">4</button>
        <button type="button" class="pin-key" data-digit="5">5</button>
        <button type="button" class="pin-key" data-digit="6">6</button>
        <button type="button" class="pin-key" data-digit="7">7</button>
        <button type="button" class="pin-key" data-digit="8">8</button>
        <button type="button" class="pin-key" data-digit="9">9</button>
        <button type="button" id="managerPinClear" class="pin-key action">Clear</button>
        <button type="button" class="pin-key" data-digit="0">0</button>
        <button type="button" id="managerPinDelete" class="pin-key action">Delete</button>
      </div>
      <div id="managerPinError" class="pin-gate-error"></div>
    </div>

    <div id="venueGateCard" class="pin-gate-card" style="display:none;">
      <div class="pin-gate-logo-row">
        <img class="pin-gate-logo" src="TwoBirdsLogo_Lockup_Black.webp" alt="TwoBirds Event Group">
      </div>
      <h2 class="pin-gate-title">Select Venue</h2>
      <p id="venueGateGreeting" class="pin-gate-greeting" style="display:none;"></p>
      <p id="venueGateSubtitle" class="pin-gate-subtitle">Detecting your location...</p>
      <div id="venueGateLoading" class="venue-gate-loading">
        <div class="venue-gate-loading-bar"></div>
      </div>
      <div id="venueGateButtons" class="pin-venue-buttons"></div>
    </div>
  </div>

  <div class="app">

    <header>
      <div class="brand">
        <div class="logo-wrap">
          <img class="logo" src="TwoBirdsLogo_Lockup_Black.webp" alt="TwoBirds Event Group">
        </div>
        <div>
          <h1>TwoBirds Tipout</h1>
          <div class="subtitle">Event payout calculator</div>
        </div>
      </div>
      <div class="header-meta">
        <div id="managerWelcome" class="manager-welcome"></div>
        <div id="venueSelectWrap" class="venue-select-wrap">
          <span class="venue-prefix">Venue:</span>
          <select id="venueSelect" class="venue-select"></select>
        </div>
      </div>
    </header>

    <div id="venuePhotoCard" class="card venue-photo-card">
      <div class="venue-photo-wrap">
        <img id="venuePhoto" class="venue-photo" alt="Current venue photo">
      </div>
      <div id="venuePhotoLabel" class="venue-photo-label"></div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label>Total Tip Pot ($)</label>
          <input id="pot" type="text" inputmode="numeric" pattern="[0-9$,.]*" value="$" />
        </div>
      </div>

      <div class="row" style="margin-top:12px;">
        <div>
          <label>Notes (optional)</label>
          <textarea id="notes" placeholder="Add any shift notes or money details..."></textarea>
        </div>
      </div>

      <div class="row actions" style="margin-top:16px;">
        <button id="addStaff">+ Staff</button>
        <button id="calc" class="primary">Calculate &amp; Send Receipt</button>
        <button id="reset" class="reset">Reset</button>
      </div>
      <div id="venuePicker" class="venue-picker" style="display:none;">
        <label style="margin-bottom:8px;">Select Venue</label>
        <div id="venueButtons" class="venue-actions"></div>
      </div>
      <div id="sendStatus" class="status"></div>
      <div id="sendLoading" class="send-loading"><div class="send-loading-bar"></div></div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Role</th>
            <th>Name</th>
            <th>Hours</th>
            <th class="right"></th>
          </tr>
        </thead>
        <tbody id="staffBody"></tbody>
      </table>
    </div>

    <div class="card results-card" id="resultsCard" style="display:none;">
      <div id="resultsEmpty" class="results-empty">Add staff rows, then click Calculate to preview tipouts.</div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th class="right">$/hr</th>
            <th class="right">Tipout</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>

    <datalist id="nameSuggestions"></datalist>

  </div>

  <div id="quickToast" class="toast" role="status" aria-live="polite"></div>

<script>
const $ = id => document.getElementById(id);

// 10% FOR EACH EVENT STAFF (not shared)
const EVENT_STAFF_PCT_EACH = 0.10;

function moneyWhole(n){ return "$" + Math.floor(n).toLocaleString(); }
function moneyRate(n){ return isFinite(n) ? "$" + n.toFixed(2) : "—"; }

const VENUES = ["Ivy House", "Starling", "Rivulet", "PSP", "Society"];
const VENUE_ADDRESS_BOOK = {
  "Ivy House": "South Barclay Street, Milwaukee, WI",
  "Starling": "102 N Water St, Milwaukee, WI 53202",
  "Rivulet": "309 N Water St, Milwaukee, WI 53202",
  "PSP": "1420 East Park Place, Milwaukee, WI",
  "Society": "910 N Doctor M.L.K Jr Dr, Milwaukee, WI 53203"
};
const VENUE_COORDINATES = {};
const VENUE_PHOTO_BOOK = {
  "Ivy House": "IvyHouse.jpg",
  "Starling": "Starling.jpg",
  "Rivulet": "Rivulet.webp",

function getVenuePhotoCandidates(venueName){
  const mapped = String(VENUE_PHOTO_BOOK[venueName] || "").trim();
  if (!mapped) return [];

  const normalized = mapped.replace(/^\.\//, "");
  const fileName = normalized.replace(/^\/+/, "");
  const pathName = String(window.location.pathname || "/");
  const basePath = pathName.endsWith("/")
    ? pathName
    : pathName.slice(0, pathName.lastIndexOf("/") + 1);
  const parts = pathName.split("/").filter(Boolean);
  const repoRoot = parts.length ? `/${parts[0]}/` : "/";

  return Array.from(new Set([
    fileName,
    `./${fileName}`,
    `${basePath}${fileName}`,
    `${repoRoot}${fileName}`,
    `/${fileName}`
  ]));
}

function setImageSourceWithFallback(img, candidates, onSuccess, onFailure){
  if (!img || !Array.isArray(candidates) || !candidates.length) {
    if (typeof onFailure === "function") onFailure();
    return;
  }

  let idx = 0;
  const tryNext = () => {
    if (idx >= candidates.length) {
      if (typeof onFailure === "function") onFailure();
      return;
    }
    const src = candidates[idx++];
    const probe = new Image();
    probe.onload = () => {
      img.src = src;
      if (typeof onSuccess === "function") onSuccess(src);
    };
    probe.onerror = tryNext;
    probe.src = src;
  };

  tryNext();
}

    document.body.style.removeProperty("--venue-bg-image");

  const photoCandidates = getVenuePhotoCandidates(venueName);

    img,

      document.body.style.setProperty("--venue-bg-image", `url(\"${src}\")`);

function initManagerGate(){
  const gate = $("pinGate");
  const pinDisplay = $("managerPinDisplay");
  const keypad = $("managerKeypad");
  const clearBtn = $("managerPinClear");
  const deleteBtn = $("managerPinDelete");
  const errorEl = $("managerPinError");
  if (!gate || !pinDisplay || !keypad || !clearBtn || !deleteBtn || !errorEl) return;

  let pinValue = "";
  let unlocking = false;

  const clearError = () => { errorEl.textContent = ""; };
  const showError = msg => { errorEl.textContent = msg; };
  const renderPin = () => {
    const dots = pinDisplay.querySelectorAll(".pin-dot");
    dots.forEach((dot, idx) => {
      dot.classList.toggle("filled", idx < pinValue.length);
    });
  };

  const setPin = value => {
    pinValue = String(value || "").replace(/\D+/g, "").slice(0, 4);
    renderPin();
  };

  const appendDigit = digit => {
    if (!/^\d$/.test(String(digit || ""))) return;
    if (pinValue.length >= 4) return;
    setPin(pinValue + digit);
    clearError();
    if (pinValue.length === 4) {
      tryUnlock();
    }
  };

  const deleteDigit = () => {
    if (!pinValue) return;
    setPin(pinValue.slice(0, -1));
    clearError();
  };

  keypad.addEventListener("click", e => {
    const btn = e.target.closest("button[data-digit]");
    if (!btn) return;
    appendDigit(btn.getAttribute("data-digit"));
  });

  clearBtn.onclick = () => {
    setPin("");
    clearError();
  };

  deleteBtn.onclick = deleteDigit;

  const tryUnlock = () => {
    if (unlocking) return;
    const pin = String(pinValue || "").trim();
    if (pin.length !== 4) {
      showError("Enter a valid 4-digit PIN.");
      return;
    }

    const managerName = MANAGER_PINS[pin];
    if (!managerName) {
      showError("Invalid manager PIN.");
      setPin("");
      return;
    }

    unlocking = true;
    startPostPinVenueFlow(managerName);
  };
  document.addEventListener("keydown", e => {
    if (gate.style.display === "none") return;
    const pinCard = $("managerPinCard");
    if (!pinCard || pinCard.style.display === "none") return;

    if (/^\d$/.test(e.key)) {
      e.preventDefault();
      appendDigit(e.key);
      return;
    }

    if (e.key === "Backspace") {
      e.preventDefault();
      deleteDigit();
      return;
    }

    if (e.key === "Escape") {
      e.preventDefault();
      setPin("");
      clearError();
      return;
    }

    if (e.key === "Enter") {
      e.preventDefault();
      tryUnlock();
    }
  });

  let existingManager = "";
  try {
    existingManager = sessionStorage.getItem(MANAGER_PIN_KEY) || "";
  } catch {}

  if (existingManager) {
    document.body.style.overflow = "hidden";
    startPostPinVenueFlow(existingManager);
    return;
  }

  showManagerPinCard();
  renderPin();
  document.body.style.overflow = "hidden";
}

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function hasExistingShiftManager(excludeRow = null){
  const body = $("staffBody");
  if (!body) return false;
  return [...body.querySelectorAll("tr")].some(tr => {
    if (excludeRow && tr === excludeRow) return false;
    const role = String(tr.querySelector(".staff-role")?.value || "").trim();
    return role === "Shift Manager";
  });
}

function sortStaffRowsByRole(){
  const body = $("staffBody");
  if (!body) return;

  const roleOrder = {
    "Shift Manager": 0,
    "Bartender": 1,
    "Event Staff": 2
  };

  const rows = [...body.querySelectorAll("tr")];
  rows
    .map((tr, idx) => ({
      tr,
      idx,
      role: String(tr.querySelector(".staff-role")?.value || "Bartender").trim()
    }))
    .sort((a, b) => {
      const aOrder = roleOrder[a.role] ?? 99;
      const bOrder = roleOrder[b.role] ?? 99;
      if (aOrder !== bOrder) return aOrder - bOrder;
      return a.idx - b.idx;
    })
    .forEach(item => body.appendChild(item.tr));
}

function addStaff(role="Bartender", name="", hours="", focusName=true){
  const tr = document.createElement("tr");
  tr.className = "staff-row";
  tr.innerHTML = `
    <td>
      <select class="staff-role">
        <option value="Event Staff">Event Staff</option>
        <option value="Shift Manager">Shift Manager</option>
        <option value="Bartender">Bartender</option>
      </select>
    </td>
    <td><input placeholder="Name" value="${escapeHtml(name)}"></td>
    <td><input class="hours-input" type="number" step="0.25" value="${escapeHtml(hours)}"></td>
    <td class="right"><button class="remove" title="Remove">✕</button></td>
  `;

  const roleSelect = tr.querySelector(".staff-role");
  const inputs = tr.querySelectorAll("input");
  const nameInput = inputs[0];
  const hoursInput = inputs[1];

  const applyRoleBehavior = () => {
    const selectedRole = String(roleSelect.value || "");
    tr.dataset.role = selectedRole;
    const isEvent = selectedRole === "Event Staff";
    if (isEvent) {
      hoursInput.value = "";
      hoursInput.disabled = true;
      hoursInput.placeholder = "—";
    } else {
      hoursInput.disabled = false;
      hoursInput.placeholder = "0";
    }
  };

  const normalizedRole = ["Event Staff", "Shift Manager", "Bartender"].includes(role) ? role : "Bartender";
  roleSelect.value = normalizedRole === "Shift Manager" && hasExistingShiftManager(tr) ? "Bartender" : normalizedRole;
  let previousRole = roleSelect.value;

  roleSelect.addEventListener("change", () => {
    const nextRole = String(roleSelect.value || "");
    if (nextRole === "Shift Manager" && hasExistingShiftManager(tr)) {
      roleSelect.value = previousRole;
      showToast("Only one Shift Manager allowed.");
      setStatus("Only one Shift Manager is allowed.", "error");
      applyRoleBehavior();
      return;
    }

    previousRole = roleSelect.value;
    applyRoleBehavior();
    sortStaffRowsByRole();
    markUncalculated();
    saveDraft();
  });

  applyRoleBehavior();

  enableNameAutocomplete(nameInput);
  enableArrowBoxNavigation(nameInput);
  enableArrowBoxNavigation(hoursInput);
  enforceLettersOnly(nameInput);
  tr.querySelector("button").onclick = () => {
    tr.remove();
    sortStaffRowsByRole();
    markUncalculated();
    saveDraft();
  };
  $("staffBody").appendChild(tr);
  sortStaffRowsByRole();
  if (focusName) nameInput.focus();
  markUncalculated();
  saveDraft();
}

  return [...body.querySelectorAll("tr")].map((tr, idx) => {

function enableNameAutocomplete(input){
  input.setAttribute("autocomplete", "off");
  input.addEventListener("focus", () => {
    updateNameSuggestions(input.value || "", input);
  });
  input.addEventListener("input", () => {
    updateNameSuggestions(input.value || "", input);
  });
  input.addEventListener("keydown", e => {
    if (!activeNameSuggestions.length || activeNameInput !== input) return;

    if (e.key === "Tab") {
      e.preventDefault();
      moveNameSuggestionHighlight(e.shiftKey ? -1 : 1);
      return;
    }

    if (e.key === "ArrowDown") {
      e.preventDefault();
      moveNameSuggestionHighlight(1);
      return;
    }

    if (e.key === "ArrowUp") {
      e.preventDefault();
      moveNameSuggestionHighlight(-1);
      return;
    }

    if (e.key === "Enter") {
      e.preventDefault();
      applyNameSuggestion(activeNameSuggestionIndex >= 0 ? activeNameSuggestionIndex : 0);
      return;
    }

    if (e.key === "Escape") {
      hideNameSuggestionMenu();
    }
  });
  input.addEventListener("blur", () => {
    setTimeout(hideNameSuggestionMenu, 100);
    autoFillUniqueFirstName(input);
  });
}

function autoFillUniqueFirstName(input){
  const raw = normalizeName(input.value || "");
  if (!raw) return;

  const query = raw.toLowerCase();
  const matches = STAFF_NAMES.filter(name => {
    return String(name || "").toLowerCase().startsWith(query);
  });

  if (matches.length === 1) {
    input.value = matches[0];
    saveDraft();
  }
}

function initNameSuggestions(){
  if ($("nameSuggestionMenu")) return;

  const menu = document.createElement("div");
  menu.id = "nameSuggestionMenu";
  menu.className = "name-suggestion-menu";
  document.body.appendChild(menu);
}

function getNameMatches(query){
  const text = String(query || "").trim().toLowerCase();
  if (!text) return [];

  return STAFF_NAMES
    .filter(name => name.toLowerCase().startsWith(text))
    .slice(0, 12);
}

function updateNameSuggestions(query, input){
  const menu = $("nameSuggestionMenu");
  if (!menu || !input) return;

  const matches = getNameMatches(query);
  if (!matches.length) {
    hideNameSuggestionMenu();
    return;
  }

  activeNameInput = input;
  activeNameSuggestions = matches;
  activeNameSuggestionIndex = 0;

  renderNameSuggestionMenu();
  positionNameSuggestionMenu(input);
}

function renderNameSuggestionMenu(){
  const menu = $("nameSuggestionMenu");
  if (!menu || !activeNameSuggestions.length) {
    hideNameSuggestionMenu();
    return;
  }

  menu.innerHTML = "";

  activeNameSuggestions.forEach((name, idx) => {
    const item = document.createElement("button");
    item.type = "button";
    item.className = "name-suggestion-item" + (idx === activeNameSuggestionIndex ? " active" : "");
    item.textContent = name;
    item.tabIndex = -1;
    item.onmousedown = e => e.preventDefault();
    item.onclick = () => applyNameSuggestion(idx);
    menu.appendChild(item);
  });

  menu.style.display = "block";
}

function positionNameSuggestionMenu(input){
  const menu = $("nameSuggestionMenu");
  if (!menu || !input) return;

  const rect = input.getBoundingClientRect();
  const left = rect.left + window.scrollX;
  const top = rect.bottom + 4 + window.scrollY;
  menu.style.left = `${left}px`;
  menu.style.top = `${top}px`;
  menu.style.width = `${rect.width}px`;
}

function moveNameSuggestionHighlight(delta){
  if (!activeNameSuggestions.length) return;

  const len = activeNameSuggestions.length;
  activeNameSuggestionIndex = (activeNameSuggestionIndex + delta + len) % len;
  renderNameSuggestionMenu();
}

function applyNameSuggestion(idx){
  if (!activeNameInput) return;
  const name = activeNameSuggestions[idx];
  if (!name) return;

  activeNameInput.value = name;
  saveDraft();
  hideNameSuggestionMenu();
}

function hideNameSuggestionMenu(){
  const menu = $("nameSuggestionMenu");
  if (menu) {
    menu.style.display = "none";
    menu.innerHTML = "";
  }
  activeNameSuggestions = [];
  activeNameSuggestionIndex = -1;
  activeNameInput = null;
}

function moveBoxFocusByArrow(currentInput, key){
  const row = currentInput.closest("tr");
  const tbody = currentInput.closest("tbody");
  if (!row || !tbody) return;

  const rows = [...tbody.querySelectorAll("tr")];
  const rowIndex = rows.indexOf(row);
  if (rowIndex < 0) return;

  const currentInputs = [...row.querySelectorAll("input")];
  const colIndex = currentInputs.indexOf(currentInput);
  if (colIndex < 0) return;

  if (key === "ArrowLeft" || key === "ArrowRight") {
    const targetCol = key === "ArrowLeft" ? colIndex - 1 : colIndex + 1;
    if (targetCol < 0 || targetCol >= currentInputs.length) return;
    const target = currentInputs[targetCol];
    target.focus();
    if (typeof target.select === "function") target.select();
    return;
  }

  if (key === "ArrowUp" || key === "ArrowDown") {
    const targetRowIndex = key === "ArrowUp" ? rowIndex - 1 : rowIndex + 1;
    if (targetRowIndex < 0 || targetRowIndex >= rows.length) return;
    const targetInputs = [...rows[targetRowIndex].querySelectorAll("input")];
    if (!targetInputs.length) return;

    const safeColIndex = Math.min(colIndex, targetInputs.length - 1);
    const target = targetInputs[safeColIndex];
    target.focus();
    if (typeof target.select === "function") target.select();
  }
}

function enableArrowBoxNavigation(input){
  input.addEventListener("keydown", e => {
    if (!["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) return;

    const tbody = input.closest("tbody");
    if (!tbody || tbody.id !== "staffBody") return;

    if (
      (e.key === "ArrowUp" || e.key === "ArrowDown") &&
      activeNameSuggestions.length &&
      activeNameInput === input
    ) {
      return;
    }

    e.preventDefault();
    moveBoxFocusByArrow(input, e.key);
  });
}

function sanitizeNameInput(value){
  return String(value || "").replace(/[^A-Za-z\s'’\-]/g, "");
}

function normalizeName(value){
  return sanitizeNameInput(value)
    .replace(/\s+/g, " ")
    .replace(/-{2,}/g, "-")
    .replace(/'{2,}/g, "'")
    .trim();
}

function isValidTypedName(value){
  const letters = String(value || "").replace(/[^A-Za-z]/g, "");
  return letters.length >= 2;
}

function getDraft(){
  const staff = getUnifiedStaffRows().map(row => ({
    role: row.role,
    name: row.name,
    hours: row.role === "Event Staff" ? "" : String(row.hours || "")
  }));

  return {
    pot: $("pot").value || "",
    notes: $("notes").value || "",
    staff
  };
}

function saveDraft(){
  try {
    localStorage.setItem(DRAFT_KEY, JSON.stringify(getDraft()));
  } catch {}
}

function clearDraft(){
  try {
    localStorage.removeItem(DRAFT_KEY);
  } catch {}
}

function restoreDraft(){
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    if (!raw) return false;

    const draft = JSON.parse(raw);
    if (!draft || typeof draft !== "object") return false;

    const potDigits = String(draft.pot || "").replace(/\D+/g, "");
    $("pot").value = "$" + (potDigits ? Number(potDigits).toLocaleString() : "");
    $("notes").value = String(draft.notes || "");

    $("staffBody").innerHTML = "";

    if (Array.isArray(draft.staff)) {
      draft.staff.forEach(row => {
        const role = String(row?.role || "Bartender");
        const name = normalizeName(row?.name || "");
        const hours = role === "Event Staff" ? "" : (row?.hours || "");
        addStaff(role, name, hours, false);
      });
    } else {
      const events = Array.isArray(draft.eventStaff) ? draft.eventStaff : [];
      const shift = draft.shiftManager && typeof draft.shiftManager === "object" ? draft.shiftManager : {};
      const bartenders = Array.isArray(draft.bartenders) ? draft.bartenders : [];

      events.forEach(name => addStaff("Event Staff", normalizeName(name), "", false));
      if (shift.name || shift.hours) {
        addStaff("Shift Manager", normalizeName(shift.name || ""), shift.hours || "", false);
      }
      bartenders.forEach(b => addStaff("Bartender", normalizeName(b.name || ""), b.hours || "", false));
    }

    if (!$("staffBody").children.length) {
      addStaff("Bartender", "", "", false);
    }

    return true;
  } catch {
    return false;
  }
}

function todayLocalISO(){
  const d = new Date();
  const tzOffset = d.getTimezoneOffset() * 60000;
  return new Date(d.getTime() - tzOffset).toISOString().slice(0,10);
}

function setStatus(msg, type=""){
  const el = $("sendStatus");
  el.textContent = msg;
  el.className = `status ${type}`.trim();
}

function setSendLoading(isLoading){
  const bar = $("sendLoading");
  if (!bar) return;
  bar.style.display = isLoading ? "block" : "none";
}

function hideVenuePicker(){
  const picker = $("venuePicker");
  const buttons = $("venueButtons");
  buttons.innerHTML = "";
  picker.style.display = "none";
}

function pickVenue(){
  return new Promise(resolve => {
    const picker = $("venuePicker");
    const buttons = $("venueButtons");
    buttons.innerHTML = "";

    VENUES.forEach(venue => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = venue;
      btn.onclick = () => {
        hideVenuePicker();
        resolve(venue);
      };
      buttons.appendChild(btn);
    });

    const cancel = document.createElement("button");
    cancel.type = "button";
    cancel.className = "cancel";
    cancel.textContent = "Cancel";
    cancel.onclick = () => {
      hideVenuePicker();
      resolve(null);
    };
    buttons.appendChild(cancel);

    picker.style.display = "block";
  });
}

function getCurrentPosition(options = {}){
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject(new Error("Geolocation is not supported."));
      return;
    }

    navigator.geolocation.getCurrentPosition(resolve, reject, {
      enableHighAccuracy: true,
      timeout: 8000,
      maximumAge: 60000,
      ...options
    });
  });
}

async function geocodeVenueAddress(venue, address){
  const cleanVenue = String(venue || "").trim();
  const cleanAddress = String(address || "").trim();
  if (!cleanVenue || !cleanAddress) return null;

  const cacheKey = `${cleanVenue}::${cleanAddress}`;
  if (venueGeocodeCache.has(cacheKey)) {
    return venueGeocodeCache.get(cacheKey);
  }

  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(cleanAddress)}`;
  const res = await fetch(url, {
    headers: { "Accept": "application/json" }
  });
  if (!res.ok) return null;

  const data = await res.json();
  const top = Array.isArray(data) ? data[0] : null;
  if (!top || !top.lat || !top.lon) return null;

  const point = {
    lat: Number(top.lat),
    lon: Number(top.lon)
  };
  if (!Number.isFinite(point.lat) || !Number.isFinite(point.lon)) return null;

  venueGeocodeCache.set(cacheKey, point);
  return point;
}

function distanceMeters(lat1, lon1, lat2, lon2){
  const toRad = deg => (deg * Math.PI) / 180;
  const earthRadius = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return earthRadius * c;
}

async function detectVenueFromLocation(){
  let coords;
  try {
    const pos = await getCurrentPosition();
    coords = pos.coords;
  } catch (err) {
    let reason = "Location unavailable.";
    if (err && typeof err.code === "number") {
      if (err.code === 1) reason = "Location permission denied.";
      if (err.code === 2) reason = "Location unavailable from device.";
      if (err.code === 3) reason = "Location request timed out.";
    }
    return { venue: null, reason };
  }

  if (!coords || !Number.isFinite(coords.latitude) || !Number.isFinite(coords.longitude)) {
    return { venue: null, reason: "Location coordinates were invalid." };
  }

  const entries = Object.entries(VENUE_ADDRESS_BOOK).filter(([, address]) => String(address || "").trim());
  if (!entries.length) return { venue: null, reason: "No venue addresses are configured." };

  let bestVenue = null;
  let bestDistance = Infinity;

  for (const [venue, address] of entries) {
    try {
      const coordOverride = VENUE_COORDINATES[venue];
      const hasOverride =
        coordOverride &&
        Number.isFinite(coordOverride.lat) &&
        Number.isFinite(coordOverride.lon);
      const point = hasOverride ? coordOverride : await geocodeVenueAddress(venue, address);
      if (!point) continue;
      const d = distanceMeters(coords.latitude, coords.longitude, point.lat, point.lon);
      if (d < bestDistance) {
        bestDistance = d;
        bestVenue = venue;
      }
    } catch {}
  }

  if (!bestVenue) return { venue: null, reason: "Could not match location to venue addresses." };
  if (bestDistance > VENUE_MATCH_RADIUS_METERS) {
    return {
      venue: bestVenue,
      reason: `Estimated from nearest venue (${Math.round(bestDistance)}m away)`,
      distanceMeters: bestDistance,
      lowConfidence: true
    };
  }

  return {
    venue: bestVenue,
    reason: "",
    distanceMeters: bestDistance,
    lowConfidence: false
  };
}

async function postToAppsScript(endpoint, payload){
  const json = JSON.stringify(payload);

  const res = await fetch(endpoint, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=UTF-8" },
    body: json
  });

  const text = await res.text();
  let data = {};
  try {
    data = text ? JSON.parse(text) : {};
  } catch {
    throw new Error("Backend returned an unreadable response.");
  }

  if (!res.ok || !data.ok) {
    throw new Error(data.error || `Send failed (HTTP ${res.status}).`);
  }

  return data;
}

async function sendReceipt(){
  if (sendingReceipt) return;
  if (!latestReceipt){
    showToast("Calculate first.");
    setStatus("Calculate first.", "error");
    return;
  }
  setStatus("");
  setSendLoading(false);
  hideVenuePicker();

  let venue = detectedVenue;
  if (!venue) {
    const reason = detectedVenueReason || "Location not matched.";
    setStatus(`${reason} Please choose your venue.`, "error");
    venue = await pickVenue();
    if (venue) {
      detectedVenue = venue;
      detectedVenueReason = "";
      setVenueBadge(`Venue: ${detectedVenue}`);
      setVenuePhoto(detectedVenue);
    }
  }
  if (!venue){
    setStatus("Send canceled or invalid venue selection.", "error");
    return;
  }

  const receipt = {
    ...latestReceipt,
    date: todayLocalISO(),
    venue,
    notes: ($("notes").value || "").trim(),
    submittedAt: new Date().toISOString()
  };

  if (!RECEIPT_ENDPOINT){
    setStatus("Receipt is ready. Backend needs Google Apps Script Web App URL ending in /exec.", "error");
    return;
  }

  if (!RECEIPT_ENDPOINT.includes("/exec")){
    setStatus("Configured backend URL is invalid. Use the Apps Script Web App /exec URL.", "error");
    return;
  }

  try {
    sendingReceipt = true;
    setSendLoading(true);
    setStatus("Sending receipt...", "");
    const response = await postToAppsScript(RECEIPT_ENDPOINT, receipt);
    if (Number(response.replacedRows || 0) > 0){
      setStatus("Receipt updated and sent!", "success");
    } else {
      setStatus("Receipt sent!", "success");
    }
  } catch (err) {
    const msg = err && err.message ? err.message : "Send failed. Verify Apps Script deployment and access to the shared sheet.";
    setStatus(msg, "error");
  } finally {
    sendingReceipt = false;
    setSendLoading(false);
  }
}

function hardReset(){
  $("pot").value = "$";
  $("notes").value = "";
  $("staffBody").innerHTML = "";
  $("resultsBody").innerHTML = "";
  $("resultsCard").style.display = "block";
  $("resultsEmpty").style.display = "block";
  latestReceipt = null;
  setSendLoading(false);
  setStatus("");
  clearDraft();
  addStaff("Bartender", "", "", false);
}

enforceMoneyInput($("pot"));
try { history.scrollRestoration = "manual"; } catch {}
scrollToTop();
window.addEventListener("load", () => {
  scrollToTop();
  setTimeout(scrollToTop, 0);
});

$("notes").addEventListener("input", saveDraft);
$("pot").addEventListener("input", markUncalculated);
$("staffBody").addEventListener("input", saveDraft);
$("staffBody").addEventListener("input", markUncalculated);

if (!restoreDraft()) {
  addStaff("Bartender", "", "", false);
}

initNameSuggestions();
initVenueSelect();
initManagerGate();

$("resultsCard").style.display = "block";
$("resultsEmpty").style.display = "block";

$("addStaff").onclick = () => addStaff();
$("reset").onclick = hardReset;

$("calc").onclick = () => {
  $("resultsBody").innerHTML = "";
  $("resultsCard").style.display = "block";
  $("resultsEmpty").style.display = "none";
  latestReceipt = null;
  setStatus("");

  const pot = getPotNumber();
  if (pot <= 0) return;

  let hasInvalidName = false;
  const staffRows = getUnifiedStaffRows();
  const roleCounts = { "Event Staff": 0, "Shift Manager": 0, "Bartender": 0 };
  const normalizedRows = staffRows.map(row => {
    const role = ["Event Staff", "Shift Manager", "Bartender"].includes(row.role) ? row.role : "Bartender";
    roleCounts[role] = (roleCounts[role] || 0) + 1;

    const cleanedName = normalizeName(row.inputs[0]?.value || row.name || "");
    row.inputs[0].value = cleanedName;
    if (cleanedName && !isValidTypedName(cleanedName)) {
      hasInvalidName = true;
    }

    const fallbackName = `${role} ${roleCounts[role]}`;
    return {
      role,
      name: cleanedName || fallbackName,
      hours: role === "Event Staff" ? 0 : (+row.inputs[1]?.value || 0)
    };
  });

  const eventStaff = normalizedRows.filter(r => r.role === "Event Staff").map(r => r.name);
  const payoutPeople = normalizedRows.filter(r => r.role !== "Event Staff" && r.hours > 0);

  if ((roleCounts["Shift Manager"] || 0) > 1) {
    setStatus("Only one Shift Manager is allowed.", "error");
    return;
  }

  if (hasInvalidName) {
    setStatus("Names must contain at least 2 letters.", "error");
    return;
  }

  if (!payoutPeople.length) return;

  // Event Staff total = 10% each
  const eventEach = eventStaff.length ? Math.floor(pot * EVENT_STAFF_PCT_EACH) : 0;
  const eventTotal = eventEach * eventStaff.length;

  const remaining = Math.max(0, pot - eventTotal);

  const totalHours = payoutPeople.reduce((s,b)=>s+b.hours,0);
  if (totalHours <= 0) return;

  // ✅ Base bartender rate, rounded to 2 decimals (display + calculation match)
  const baseRateRaw = remaining / totalHours;
  const baseRate = Math.round(baseRateRaw * 100) / 100;

  const body = $("resultsBody");
  const entries = [];

  // Event Staff rows
  eventStaff.forEach(name => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${escapeHtml(name)}</td>
      <td class="right">—</td>
      <td class="right"><b>${moneyWhole(eventEach)}</b></td>
    `;
    body.appendChild(tr);

    entries.push({
      role: "Event Staff",
      name,
      hours: null,
      rate: null,
      tipout: Math.floor(eventEach)
    });
  });

  // Shift Manager + Bartender rows (tipout uses rounded baseRate)
  payoutPeople.forEach(b => {
    const tipout = Math.floor(b.hours * baseRate);
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${escapeHtml(b.name)}</td>
      <td class="right">${moneyRate(baseRate)}</td>
      <td class="right"><b>${moneyWhole(tipout)}</b></td>
    `;
    body.appendChild(tr);

    entries.push({
      role: b.role,
      name: b.name,
      hours: b.hours,
      rate: baseRate,
      tipout
    });
  });

  latestReceipt = {
    totalPot: pot,
    eventStaffCount: eventStaff.length,
    bartenderCount: payoutPeople.length,
    remainingForBartenders: remaining,
    bartenderRate: baseRate,
    entries
  };

  $("resultsCard").style.display = "block";
  $("resultsEmpty").style.display = "none";
  saveDraft();
  setStatus("Calculated. Sending receipt...", "success");
  sendReceipt();
};
